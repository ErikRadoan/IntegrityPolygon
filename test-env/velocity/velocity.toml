# This is the Velocity configuration file. All settings can be customized here.
# What port should the proxy be bound to? By default, we'll bind to all addresses on port 25577.
bind = "0.0.0.0:25577"
# What should be the MOTD? This gets displayed when the player adds your server to
# their server list. Only MiniMessage format is accepted.
motd = "<bold><dark_aqua>IntegrityPolygon </dark_aqua></bold><gray>Test Server"
# What should we display for the maximum number of players? (Velocity does not support a cap
# on the number of players online.)
show-max-players = 100
# Should we authenticate players with Mojang? By default, this is on.
online-mode = false
#Should the proxy enforce the new public key security standard? By default, this is on.
force-key-authentication = false
# Should the proxy enforce the new public key security standard? By default, this is on.
# enable this if you want the proxy to be compatible with old forge clients or old forge mods.
# See https://velocitypowered.com/wiki/deployment/security/ for more details.
# Specify which kind of player information forwarding to use. Available types:
# - "none":        All players' information is not forwarded. Players will appear as offline mode.
# - "legacy":      BungeeCord-style IP forwarding
# - "bungeeguard": BungeeCord-style with a token
# - "modern":      Velocity native forwarding. Use this when possible.
player-info-forwarding-mode = "modern"
#If you are using modern or BungeeGuard IP forwarding, configure a file that contains a unique secret here.
#The file is expected to be UTF-8 encoded and not empty.
forwarding-secret-file = "forwarding.secret"
# Announce whether the proxy supports Forge. If you run a modded server, we suggest
# turning this on.
announce-forge = false
# If enabled (default is false) and the proxy is in online mode, Velocity will kick
# any existing player who is online if a duplicate connection attempt is made.
kick-existing-players = false
# Should Velocity pass server list ping requests to a backend server?
# Available options:
# - "disabled":    No pass-through will be done. The velocity.toml and server-icon.png
#                  will determine the initial server list ping response.
# - "mods":        Passes only the mod list from your backend server into the
#                  response. The first server in your try list (or forced host) with a
#                  mod list will be used. If no backend server can be contacted, Velocity
#                  won't display any mod information.
# - "description": Uses the server's MOTD as the description (MOTD) in the response.
#                  The first server in your try list (or forced host) will be used for
#                  the description.
# - "all":         Uses the backend server's response as the proxy response. The first
#                  server in your try list (or forced host) will be used. If no server could
#                  be contacted, a generic response is sent.
ping-passthrough = "DISABLED"
# If not enabled (default is true) player IP addresses will be replaced by <ip address
# withheld> in logs
enable-player-address-logging = true
forced-hosts = {}
config-version = "2.7"

[servers]
	# Configure your servers here. Each key is a server name, and the value is an
	# IP:port pair, optionally with ":" and a port number.
	lobby = "paper:25565"
	# In what order we should try servers when a player logs in or is kicked from a server.
	try = ["lobby"]

# Configure your forced hosts here.
[advanced]
	# How large a Minecraft packet has to be before we compress it.
	compression-threshold = 256
	# How much compression should be done (from 0-9). The default is -1, which uses
	# the default compression level of 6.
	compression-level = -1
	# How fast (in milliseconds) are clients allowed to connect after the last connection? By
	# default, this is three seconds. Disable this by setting this to 0.
	login-ratelimit = 3000
	# Specify a custom timeout for connection timeouts here. The default is five seconds.
	connection-timeout = 5000
	# Specify a read timeout for connections here. The default is 30 seconds.
	read-timeout = 30000
	# Enables compatibility with HAProxy's PROXY protocol. If you don't know what this is for,
	# then don't enable it.
	haproxy-protocol = false
	# Enables TCP fast open support, if the server platform and the client's JVM supports it.
	tcp-fast-open = false
	# Enables BungeeCord plugin messaging channel support on Velocity.
	bungee-plugin-message-channel = true
	# Shows ping requests to the proxy from clients.
	show-ping-requests = false
	# By default, Velocity will attempt to gracefully handle situations where the user
	# unexpectedly loses connection to the server without being disconnected. When enabled,
	# Velocity will only forward disconnect packets from the backend server to the player
	# if the player has currently been connected to that server for more than 5 seconds.
	# Disable this if this is causing issues for you.
	failover-on-unexpected-server-disconnect = true
	# Declares the proxy commands to 1.13+ clients.
	announce-proxy-commands = true
	# Enables the logging of commands
	log-command-executions = false
	# Enables logging of player connections when connecting to the proxy, switching servers
	# and disconnecting from the proxy.
	log-player-connections = true
	#Allows players transferred from other hosts via the
	#Transfer packet (Minecraft 1.20.5) to be received.
	accepts-transfers = false

[query]
	# Whether to enable responding to GameSpy 4 query responses or not.
	enabled = false
	# If query is enabled, on what port should the query protocol listen on?
	port = 25577
	# This is the map name that is reported to the query services.
	map = "Velocity"
	# Whether plugins should be shown in query response by default or not
	show-plugins = false
