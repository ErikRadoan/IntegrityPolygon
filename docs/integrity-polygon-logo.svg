<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 110" width="400" height="110">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1ECFB0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0E8A74;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4DFFE0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1ECFB0;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="hexClip">
      <polygon points="74,30 93,30 102,44 93,58 74,58 65,44"/>
    </clipPath>
  </defs>

  <!-- Hexagonal shield outline (outer) -->
  <polygon
    points="70,18 100,18 115,44 100,70 70,70 55,44"
    fill="none"
    stroke="#1ECFB0"
    stroke-width="1.5"
    stroke-opacity="0.3"
  />

  <!-- Hexagonal shield (main fill) -->
  <polygon
    points="70,22 97,22 111,44 97,66 70,66 56,44"
    fill="url(#shieldGrad)"
    filter="url(#glow)"
    opacity="0.15"
  />
  <!-- Hexagonal shield (main border) -->
  <polygon
    points="70,22 97,22 111,44 97,66 70,66 56,44"
    fill="none"
    stroke="url(#shieldGrad)"
    stroke-width="2"
    filter="url(#glow)"
  />

  <!-- Inner polygon (smaller hexagon, dashed) -->
  <polygon
    points="74,30 93,30 102,44 93,58 74,58 65,44"
    fill="none"
    stroke="#1ECFB0"
    stroke-width="1"
    stroke-opacity="0.5"
    stroke-dasharray="3,2"
  />

  <!-- Sine wave inside hexagon (clipped) -->
  <path
    d="M65,44
       C68.6,44 69.8,37 73.5,37
       C77.2,37 78.4,51 82,51
       C85.6,51 86.8,37 90.5,37
       C94.2,37 95.4,51 99,51
       C100.8,51 101.5,46.5 102,44"
    fill="none"
    stroke="url(#accentGrad)"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#glow)"
    clip-path="url(#hexClip)"
  />

  <!-- Corner accent dots -->
  <circle cx="70" cy="22" r="2" fill="#1ECFB0" opacity="0.6"/>
  <circle cx="97" cy="22" r="2" fill="#1ECFB0" opacity="0.6"/>
  <circle cx="111" cy="44" r="2" fill="#1ECFB0" opacity="0.6"/>
  <circle cx="97" cy="66" r="2" fill="#1ECFB0" opacity="0.6"/>
  <circle cx="70" cy="66" r="2" fill="#1ECFB0" opacity="0.6"/>
  <circle cx="56" cy="44" r="2" fill="#1ECFB0" opacity="0.6"/>

  <!-- Wordmark: INTEGRITY -->
  <text
    x="132"
    y="48"
    font-family="'Courier New', 'Lucida Console', monospace"
    font-size="22"
    font-weight="700"
    letter-spacing="4"
    fill="#1a2e40"
  >INTEGRITY</text>

  <!-- Wordmark: POLYGON -->
  <text
    x="133"
    y="68"
    font-family="'Courier New', 'Lucida Console', monospace"
    font-size="14"
    font-weight="400"
    letter-spacing="8"
    fill="url(#accentGrad)"
    filter="url(#glow)"
  >POLYGON</text>
</svg>
