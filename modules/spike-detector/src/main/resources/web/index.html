<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spike Detector</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0b1220;--surface:#111a2f;--card:#16213b;--input:#1a2844;--border:#24314d;--border-hl:#3a4d74;--text:#e5ecff;--dim:#9ba9c7;--muted:#6f7d98;--accent:#4f7cff;--blue:#3fb0ff;--green:#26c281;--amber:#f3a83b;--red:#ef5b67;--chart-grid:rgba(155,169,199,.22);--chart-glow:rgba(79,124,255,.12);--r:6px;--font:'Inter',system-ui,sans-serif;--mono:'JetBrains Mono',Consolas,monospace}
[data-theme="midnight"]{--bg:#0f1016;--surface:#171922;--card:#1d2130;--input:#23283a;--border:#2a3044;--border-hl:#3b4560;--text:#e7e9f5;--dim:#a8afc9;--muted:#7c86a3;--accent:#7d8bff;--blue:#58a2ff;--chart-grid:rgba(168,175,201,.22);--chart-glow:rgba(125,139,255,.1)}
[data-theme="nord"]{--bg:#2e3440;--surface:#3b4252;--card:#434c5e;--input:#4c566a;--border:#5b6477;--border-hl:#7b869f;--text:#eceff4;--dim:#d0d7e4;--muted:#a1aec6;--accent:#88c0d0;--blue:#81a1c1;--red:#bf616a;--amber:#ebcb8b;--green:#a3be8c;--chart-grid:rgba(208,215,228,.22);--chart-glow:rgba(136,192,208,.08)}
[data-theme="emerald"]{--bg:#051612;--surface:#0c201b;--card:#123029;--input:#173c33;--border:#214b3f;--border-hl:#2f6657;--text:#dbf2e8;--dim:#9ecdb8;--muted:#6da48d;--accent:#34d399;--blue:#2dd4bf;--chart-grid:rgba(158,205,184,.2);--chart-glow:rgba(52,211,153,.1)}
[data-theme="light"]{--bg:#f5f7fb;--surface:#fff;--card:#f8faff;--input:#f0f4ff;--border:#dde4f3;--border-hl:#c4d0e8;--text:#1d2433;--dim:#58627a;--muted:#818aa1;--accent:#2f6bff;--blue:#2f88ff;--red:#dd4452;--amber:#b97a1c;--green:#12935e;--chart-grid:rgba(88,98,122,.2);--chart-glow:rgba(47,107,255,.08)}
[data-theme="rose"]{--bg:#1a1117;--surface:#241823;--card:#2f1f2d;--input:#3b2740;--border:#4d3350;--border-hl:#654768;--text:#f3e3ee;--dim:#c79cb8;--muted:#9c7890;--accent:#f278a4;--blue:#c188ff}
body{background:var(--bg);color:var(--text);font-family:var(--font),sans-serif;padding:20px;font-size:13px;line-height:1.5}
.header{display:flex;justify-content:space-between;align-items:flex-end;gap:12px;margin-bottom:14px}
.title{font-size:22px;font-weight:700;letter-spacing:-.01em}
.sub{color:var(--dim);font-size:12px;margin-top:2px}
.badge{display:inline-flex;align-items:center;gap:6px;padding:5px 8px;border-radius:var(--r);background:var(--card);border:1px solid var(--border);font-size:11px;color:var(--dim)}
.badge i{display:block;width:7px;height:7px;border-radius:50%;background:var(--green)}
.metrics{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:10px;margin-bottom:12px}
.metric{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:13px 14px}
.metric .l{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.8px;font-weight:600}
.metric .v{font-size:24px;font-weight:700;margin-top:2px;font-variant-numeric:tabular-nums}
.metric .v.red{color:var(--red)}.metric .v.amber{color:var(--amber)}.metric .v.green{color:var(--green)}
.metric-main .v{display:flex;align-items:baseline;gap:8px}
.metric-main .delta{font-size:11px;color:var(--dim)}
.layout{display:grid;grid-template-columns:1.8fr 1fr;gap:12px;align-items:start}
.col{display:grid;gap:12px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px}
.card h3{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.85px;color:var(--dim);margin-bottom:10px}
.chart-wrap{height:300px;border:1px solid var(--border-hl);border-radius:calc(var(--r) + 2px);padding:12px;background:linear-gradient(180deg,color-mix(in srgb,var(--card) 88%, #fff 12%),var(--card));box-shadow:inset 0 1px 0 rgba(255,255,255,.03),0 10px 30px var(--chart-glow)}
#spikeChart{width:100%;height:100%;display:block}
.chart-legend{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;color:var(--dim);font-size:11px}
.chart-legend span{display:inline-flex;align-items:center;gap:6px;padding:3px 8px;border:1px solid var(--border);border-radius:999px;background:var(--card)}
.chart-legend span::before{content:'';display:inline-block;width:8px;height:8px;border-radius:50%}
.chart-legend .l1::before{background:var(--amber)}
.chart-legend .l2::before{background:var(--red)}
.chart-legend .l3::before{background:var(--blue)}
.table{width:100%;border-collapse:collapse}
.table th,.table td{padding:8px 10px;border-bottom:1px solid var(--border);text-align:left;vertical-align:middle}
.table th{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.75px;font-weight:600}
.table td{font-size:12px}
.controls{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.field label{display:block;font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.7px;margin-bottom:4px}
.field input{width:100%;padding:8px 10px;background:var(--input);color:var(--text);border:1px solid var(--border);border-radius:var(--r);font-family:var(--font),sans-serif;font-size:12px}
.field input:focus{outline:none;border-color:var(--accent)}
.actions{display:flex;gap:8px;justify-content:flex-end;margin-top:10px}
.btn{padding:7px 12px;border-radius:var(--r);border:1px solid var(--border);background:var(--card);color:var(--text);cursor:pointer;font-size:12px;font-weight:600;font-family:var(--font),sans-serif}
.btn:hover{border-color:var(--border-hl)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.sev{display:inline-block;padding:2px 7px;border-radius:var(--r);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px}
.sev.warn{background:rgba(243,168,59,.15);color:var(--amber)}
.sev.critical{background:rgba(239,91,103,.16);color:var(--red)}
.empty{color:var(--muted);padding:12px 2px}
@media(max-width:1100px){.metrics{grid-template-columns:1fr 1fr}.layout{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="header">
  <div>
    <div class="title">Spike Detector</div>
    <div class="sub">Chunk lag intelligence and mitigation control for Paper backends.</div>
  </div>
  <div class="badge"><i></i><span id="syncState">Live</span></div>
</div>
<div id="app">Loading...</div>

<script>
(function(){
  const p=new URLSearchParams(location.search),t=p.get('theme');
  setTheme(t);
  window.addEventListener('message',function(e){
    if(e.data&&e.data.type==='ip-theme-change'){
      setTheme(e.data.theme);
      render();
    }
  });
})();

function setTheme(theme){
  const t=(theme||'').toLowerCase();
  if(!t||t==='default'||t==='indigo'){
    document.documentElement.removeAttribute('data-theme');
    return;
  }
  document.documentElement.setAttribute('data-theme',t);
}

const token=new URLSearchParams(location.search).get('token');
const API=location.origin+'/api/modules/spike-detector/';
let state={status:{},servers:[],config:{},nameByExtenderId:{}};

async function api(path,opt={}){
  const r=await fetch(API+path,{...opt,headers:{'Content-Type':'application/json','Authorization':'Bearer '+token}});
  const d=await r.json().catch(()=>({}));
  if(!r.ok) throw d;
  return d;
}

async function rootApi(path,opt={}){
  const r=await fetch(location.origin+path,{...opt,headers:{'Content-Type':'application/json','Authorization':'Bearer '+token}});
  const d=await r.json().catch(()=>({}));
  if(!r.ok) throw d;
  return d;
}

async function load(){
  const sync=document.getElementById('syncState');
  try{
    if(sync) sync.textContent='Syncing';
    const [status,servers,config,rootStatus]=await Promise.all([
      api('status'),
      api('servers'),
      api('config'),
      rootApi('/api/status').catch(()=>({servers:[]}))
    ]);

    const nameByExtenderId={};
    (rootStatus.servers||[]).forEach(v=>{
      if(v&&v.extender_enrolled&&v.extender_id&&v.name){
        nameByExtenderId[String(v.extender_id)]=String(v.name);
      }
    });

    const normalizedServers=((servers&&servers.servers)||[]).map(row=>({
      ...row,
      display_name: nameByExtenderId[String(row.id||'')] || row.name || row.id
    }));

    state={status:status||{},servers:normalizedServers,config:config||{},nameByExtenderId};
    render();
    if(sync) sync.textContent='Live';
  }catch(e){
    document.getElementById('app').innerHTML='<div class="card" style="color:var(--red)">Failed to load Spike Detector data.</div>';
    if(sync) sync.textContent='Error';
  }
}

function render(){
  const s=state.status||{};
  const servers=(state.servers||[]).slice().sort((a,b)=>Number(b.top_tick_ms||0)-Number(a.top_tick_ms||0));
  const top=servers[0]||null;
  const avgTop=servers.length?(servers.reduce((acc,row)=>acc+Number(row.top_tick_ms||0),0)/servers.length):0;
  const criticalTick=Number(state.config.critical_tick_ms||s.critical_tick_ms||140);

  let html='';
  html+='<div class="metrics">'+
    '<div class="metric metric-main"><div class="l">Most Impacted Server</div><div class="v '+(top&&top.top_tick_ms>=criticalTick?'red':'amber')+'">'+esc(top?top.display_name:'-')+' <span class="delta">'+(top?Number(top.top_tick_ms||0).toFixed(1)+' ms':'No data')+'</span></div></div>'+
    '<div class="metric"><div class="l">Warn Spikes</div><div class="v amber">'+num(s.warn_spikes)+'</div></div>'+
    '<div class="metric"><div class="l">Critical Spikes</div><div class="v red">'+num(s.critical_spikes)+'</div></div>'+
    '<div class="metric"><div class="l">Auto Mitigate</div><div class="v '+(s.auto_mitigate_critical?'green':'amber')+'">'+(s.auto_mitigate_critical?'Enabled':'Disabled')+'</div></div>'+
  '</div>';

  html+='<div class="layout">';
  html+='<div class="col">';
  html+='<div class="card"><h3>Spike Pressure Map</h3><div class="chart-wrap"><canvas id="spikeChart"></canvas></div><div class="chart-legend"><span class="l1">Top tick (ms)</span><span class="l2">Critical chunks</span><span class="l3">Flagged chunks</span></div></div>';

  html+='<div class="card"><h3>Server Queue</h3>';
  if(!servers.length){
    html+='<div class="empty">No profiling reports yet.</div>';
  }else{
    html+='<table class="table"><thead><tr><th>Server</th><th>Flagged</th><th>Critical</th><th>Top Tick</th><th>Action</th></tr></thead><tbody>';
    servers.forEach(row=>{
      html+='<tr><td>'+esc(row.display_name||row.name)+'</td><td>'+num(row.flagged)+'</td><td>'+num(row.critical_count)+'</td><td>'+Number(row.top_tick_ms||0).toFixed(1)+' ms</td><td><button class="btn" onclick="viewServer(\''+esc(row.id||row.name)+'\')">Inspect</button></td></tr>';
    });
    html+='</tbody></table>';
  }
  html+='</div>';
  html+='</div>';

  html+='<div class="col">';
  html+='<div class="card"><h3>Configuration</h3><div class="controls">'+
    field('Warn Tick (ms)','warn_tick_ms',state.config.warn_tick_ms)+
    field('Critical Tick (ms)','critical_tick_ms',state.config.critical_tick_ms)+
    field('Top Chunks','top_chunks',state.config.top_chunks)+
    field('Profile Interval (sec)','profiling_interval_sec',state.config.profiling_interval_sec)+
    '</div><div class="actions"><button class="btn" onclick="load()">Refresh</button><button class="btn primary" onclick="saveCfg()">Save</button></div></div>';

  html+='<div class="card"><h3>Important Numbers</h3><table class="table"><tbody>'+
    '<tr><td>Connected servers</td><td style="text-align:right">'+num(s.servers)+'</td></tr>'+
    '<tr><td>Average top tick</td><td style="text-align:right">'+avgTop.toFixed(1)+' ms</td></tr>'+
    '<tr><td>Warn threshold</td><td style="text-align:right">'+num(state.config.warn_tick_ms)+' ms</td></tr>'+
    '<tr><td>Critical threshold</td><td style="text-align:right">'+num(state.config.critical_tick_ms)+' ms</td></tr>'+
    '<tr><td>Top chunks tracked</td><td style="text-align:right">'+num(state.config.top_chunks)+'</td></tr>'+
    '</tbody></table></div>';
  html+='</div>';
  html+='</div>';

  document.getElementById('app').innerHTML=html;
  drawSpikeChart(servers);
}

function drawSpikeChart(rows){
  const canvas=document.getElementById('spikeChart');
  if(!canvas) return;
  const ctx=canvas.getContext('2d');
  const dpr=window.devicePixelRatio||1;
  const w=Math.max(320,canvas.parentElement.clientWidth-8);
  const h=272;
  canvas.width=w*dpr; canvas.height=h*dpr;
  canvas.style.width=w+'px'; canvas.style.height=h+'px';
  ctx.scale(dpr,dpr); ctx.clearRect(0,0,w,h);

  const css=getComputedStyle(document.documentElement);
  const cAmber=css.getPropertyValue('--amber').trim();
  const cRed=css.getPropertyValue('--red').trim();
  const cBlue=css.getPropertyValue('--blue').trim();
  const cGrid=css.getPropertyValue('--chart-grid').trim();
  const cDim=css.getPropertyValue('--dim').trim();

  if(!rows.length){
    ctx.fillStyle=cDim; ctx.font='12px Inter, sans-serif';
    ctx.fillText('No data yet', 10, 22);
    return;
  }

  const top=rows.slice(0,8);
  const maxTick=Math.max(1,...top.map(r=>Number(r.top_tick_ms||0)));
  const maxCrit=Math.max(1,...top.map(r=>Number(r.critical_count||0)));
  const maxFlag=Math.max(1,...top.map(r=>Number(r.flagged||0)));
  const left=42,right=w-8,bottom=h-28,topY=14,plotW=right-left,plotH=bottom-topY;
  const step=plotW/top.length;

  ctx.strokeStyle=cGrid; ctx.lineWidth=1;
  for(let i=0;i<5;i++){
    const y=topY+(plotH*(i/4));
    ctx.beginPath();
    ctx.moveTo(left,y);
    ctx.lineTo(right,y);
    ctx.stroke();
    const v=(maxTick*(1-(i/4))).toFixed(0);
    ctx.fillStyle=cDim;
    ctx.font='10px Inter, sans-serif';
    ctx.fillText(v+' ms', 4, y+3);
  }

  top.forEach((r,i)=>{
    const x=left+i*step+step*0.08;
    const bw=Math.max(8,step*0.22);
    const tickH=(Number(r.top_tick_ms||0)/maxTick)*plotH;
    const critH=(Number(r.critical_count||0)/maxCrit)*plotH;
    const flagH=(Number(r.flagged||0)/maxFlag)*plotH;

    bar(ctx,x,bottom-tickH,bw,tickH,cAmber);
    bar(ctx,x+bw+4,bottom-critH,bw,critH,cRed);
    bar(ctx,x+(bw*2)+8,bottom-flagH,bw,flagH,cBlue);

    ctx.fillStyle=cDim; ctx.font='10px Inter, sans-serif';
    const label=String(r.display_name||r.name||'?').slice(0,11);
    ctx.fillText(label, x-2, bottom+14);
  });
}

function bar(ctx,x,y,w,h,color){
  const r=Math.min(3,h/2,w/2);
  ctx.fillStyle=color;
  ctx.beginPath();
  ctx.moveTo(x,y+h);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h);
  ctx.closePath();
  ctx.fill();
}

function field(label,id,val){
  return '<div class="field"><label>'+label+'</label><input id="'+id+'" value="'+num(val)+'"></div>';
}

async function viewServer(serverId){
  try{
    const d=await api('server/'+encodeURIComponent(serverId));
    let rows='';
    (d.flagged||[]).forEach(c=>{
      const sev=c.critical?'<span class="sev critical">critical</span>':'<span class="sev warn">warn</span>';
      rows+='<tr><td>'+sev+'</td><td>'+esc(c.world)+' ['+c.x+', '+c.z+']</td><td>'+num(c.tickMs).toFixed(2)+' ms</td><td>'+num(c.entityCount)+'</td><td>'+num(c.tileEntityCount)+'</td><td><button class="btn" onclick="mitigate(\''+esc(serverId)+'\',\''+esc(c.world)+'\','+c.x+','+c.z+')">Mitigate</button></td></tr>';
    });
    if(!rows) rows='<tr><td colspan="6" class="empty">No flagged chunks for this server.</td></tr>';
    const displayName=(state.nameByExtenderId&&state.nameByExtenderId[String(serverId)]) || d.name || serverId;
    const html='<div class="card"><h3>'+esc(displayName)+' - flagged chunks</h3><table class="table"><thead><tr><th>Severity</th><th>Chunk</th><th>Tick</th><th>Entities</th><th>Tiles</th><th>Action</th></tr></thead><tbody>'+rows+'</tbody></table><div class="actions"><button class="btn" onclick="render()">Back</button></div></div>';
    document.getElementById('app').innerHTML=html;
  }catch(e){alert('Failed to load server details');}
}

async function mitigate(server,world,x,z){
  await api('mitigate/'+encodeURIComponent(server)+'/'+encodeURIComponent(world)+'/'+x+'/'+z,{method:'POST'});
  await viewServer(server);
}

async function saveCfg(){
  const body={
    warn_tick_ms:Number(document.getElementById('warn_tick_ms').value),
    critical_tick_ms:Number(document.getElementById('critical_tick_ms').value),
    top_chunks:Number(document.getElementById('top_chunks').value),
    profiling_interval_sec:Number(document.getElementById('profiling_interval_sec').value)
  };
  await api('config',{method:'POST',body:JSON.stringify(body)});
  await load();
}

function num(v){const n=Number(v);return Number.isFinite(n)?n:0;}
function esc(v){return String(v||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

load();
setInterval(load,6000);
window.addEventListener('resize',()=>render());
</script>
</body>
</html>
