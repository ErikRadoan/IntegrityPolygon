<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spike Detector — IntegrityPolygon</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --font:   "IBM Plex Sans", system-ui, sans-serif;
      --mono:   "IBM Plex Mono", Consolas, monospace;
      --bg:     #090b10;
      --surface:#0e1118;
      --card:   #121722;
      --input:  #0c1018;
      --hover:  #181f2e;
      --active: #1e2738;
      --border: rgba(80,110,150,.22);
      --bhl:    rgba(110,150,200,.38);
      --text:   #d0ecde;
      --dim:    #5fa882;
      --muted:  #30604a;
      --accent: #34d399;
      --adim:   rgba(52,211,153,.1);
      --blue:   #2dd4bf;
      --bdim:   rgba(45,212,191,.1);
      --red:    #ef4444;
      --rdim:   rgba(239,68,68,.1);
      --amber:  #f59e0b;
      --green:  #34d399;
      --gdim:   rgba(52,211,153,.12);
      --r: 3px;
    }
    [data-theme="midnight"]{--bg:#0f1016;--surface:#14161f;--card:#1a1e2c;--input:#1e2230;--hover:#242a3a;--active:#2c3348;--border:rgba(110,125,160,.2);--bhl:rgba(140,158,200,.36);--text:#e2e6f5;--dim:#96a0bf;--muted:#667088;--accent:#7d8bff;--adim:rgba(125,139,255,.1);--blue:#58a2ff;--bdim:rgba(88,162,255,.1);--red:#ef5b67;--rdim:rgba(239,91,103,.1);--amber:#f3a83b;--green:#22d3a7;--gdim:rgba(34,211,167,.12)}
    [data-theme="nord"]{--bg:#2e3440;--surface:#373e4e;--card:#3f4758;--input:#464f62;--hover:#505a6e;--active:#5a6578;--border:rgba(200,210,228,.14);--bhl:rgba(210,220,235,.28);--text:#eceff4;--dim:#cad0de;--muted:#9aa5bc;--accent:#88c0d0;--adim:rgba(136,192,208,.12);--blue:#81a1c1;--bdim:rgba(129,161,193,.12);--red:#bf616a;--rdim:rgba(191,97,106,.12);--amber:#ebcb8b;--green:#a3be8c;--gdim:rgba(163,190,140,.14)}
    [data-theme="emerald"]{--bg:#051612;--surface:#091e18;--card:#0f2820;--input:#133228;--hover:#193c30;--active:#204838;--border:rgba(60,120,95,.24);--bhl:rgba(90,160,128,.36);--text:#d8f0e6;--dim:#8ec8b0;--muted:#5a9878;--accent:#34d399;--adim:rgba(52,211,153,.12);--blue:#2dd4bf;--bdim:rgba(45,212,191,.12);--red:#f87171;--rdim:rgba(248,113,113,.12);--amber:#fbbf24;--green:#22c55e;--gdim:rgba(34,197,94,.12)}
    [data-theme="rose"]{--bg:#120a0d;--surface:#180f14;--card:#1e1419;--input:#241820;--hover:#2c1e28;--active:#342430;--border:rgba(200,50,80,.1);--bhl:rgba(240,80,110,.2);--text:#eedce4;--dim:#a87088;--muted:#684858;--accent:#fb7185;--adim:rgba(251,113,133,.1);--blue:#e879f9;--bdim:rgba(232,121,249,.1);--red:#fb7185;--rdim:rgba(251,113,133,.1);--amber:#f59e0b;--green:#22c55e;--gdim:rgba(34,197,94,.1)}

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      background: transparent;
      color: var(--text);
      font-size: 13px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }
    #app { padding: 16px; }

    @keyframes fadeIn  { from { opacity:0; transform:translateY(3px); } to { opacity:1; transform:none; } }
    @keyframes slideUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }
    .fade-in  { animation: fadeIn  .22s ease both; }
    .slide-up { animation: slideUp .28s ease both; }

    /* ── Server picker ── */
    .picker-header { margin-bottom: 14px; }
    .picker-title    { font-size: 15px; font-weight: 700; letter-spacing: -.2px; }
    .picker-subtitle { font-size: 10px; color: var(--muted); font-family: var(--mono); text-transform: uppercase; letter-spacing: .8px; margin-top: 2px; }

    .server-table { width: 100%; border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; background: var(--border); display: flex; flex-direction: column; gap: 1px; }
    .server-row { background: var(--card); display: grid; grid-template-columns: 1fr auto auto auto; align-items: center; gap: 16px; padding: 13px 16px; transition: background .1s; cursor: pointer; }
    .server-row:hover { background: var(--hover); }
    .srv-name { font-weight: 600; font-size: 13px; display: flex; align-items: center; gap: 8px; }
    .srv-addr { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-top: 2px; }
    .srv-stats { display: flex; gap: 20px; align-items: center; }
    .srv-stat  { text-align: center; }
    .srv-stat .sl { font-family: var(--mono); font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; }
    .srv-stat .sv { font-family: var(--mono); font-size: 13px; font-weight: 700; line-height: 1.2; margin-top: 1px; }

    /* ── Back / topbar ── */
    .topbar { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    .back-btn {
      display: inline-flex; align-items: center; justify-content: center;
      width: 30px; height: 30px; border: 1px solid var(--border);
      background: var(--input); color: var(--dim); border-radius: var(--r);
      cursor: pointer; transition: all .1s; flex-shrink: 0;
    }
    .back-btn:hover { border-color: var(--bhl); color: var(--text); }
    .back-btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; }
    .topbar-title { font-size: 15px; font-weight: 700; letter-spacing: -.2px; }
    .topbar-sub   { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-top: 1px; }

    /* ── Stat grid ── */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 1px; margin-bottom: 10px;
      border: 1px solid var(--border);
      border-radius: var(--r);
      background: var(--border);
      overflow: hidden;
    }
    .stat-cell { background: var(--card); padding: 11px 13px; }
    .stat-label {
      font-size: 9px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1.1px; color: var(--muted); font-family: var(--mono);
    }
    .stat-value {
      font-size: 20px; font-weight: 700; font-family: var(--mono);
      letter-spacing: -.5px; line-height: 1.2; margin-top: 3px;
    }
    .stat-value.accent { color: var(--accent); }
    .stat-value.green  { color: var(--green); }
    .stat-value.red    { color: var(--red); }
    .stat-value.amber  { color: var(--amber); }
    .stat-value.blue   { color: var(--blue); }

    /* ── Layout ── */
    .cols { display: grid; grid-template-columns: 1.7fr 1fr; gap: 10px; }
    @media (max-width: 900px) { .cols { grid-template-columns: 1fr; } }

    /* ── Cards ── */
    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--r); padding: 14px 16px; margin-bottom: 10px;
    }
    .card-title {
      font-size: 9px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1.3px; color: var(--muted); font-family: var(--mono);
      margin-bottom: 12px; display: flex; align-items: center; gap: 7px;
    }
    .card-title svg { width: 13px; height: 13px; stroke: var(--muted); fill: none; stroke-width: 2; }

    /* ── Chart panel ── */
    .chart-panel {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--r); overflow: hidden; margin-bottom: 10px;
    }
    .chart-panel-header { display: flex; justify-content: space-between; align-items: flex-start; padding: 13px 14px 8px; }
    .chart-panel-title  { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.3px; color: var(--muted); font-family: var(--mono); }
    .chart-legend { display: flex; gap: 12px; flex-wrap: wrap; padding: 0 14px 6px; }
    .chart-legend-item { display: flex; align-items: center; gap: 5px; font-size: 10px; font-family: var(--mono); color: var(--muted); }
    .chart-legend-dot  { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .chart-canvas-wrap { padding: 0 4px 4px; }
    .chart-canvas-wrap canvas { width: 100%; display: block; }

    /* ── Plugin / chunk table ── */
    .data-table { width: 100%; border-collapse: collapse; font-size: 11px; }
    .data-table thead th {
      text-align: left; font-size: 9px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .8px; color: var(--muted); font-family: var(--mono);
      padding: 0 10px 8px; border-bottom: 1px solid var(--border);
    }
    .data-table tbody td { padding: 7px 10px; border-bottom: 1px solid var(--border); font-family: var(--mono); font-size: 11px; }
    .data-table tbody tr:last-child td { border-bottom: none; }
    .data-table tbody tr:hover td { background: var(--hover); }

    /* ── Badges ── */
    .badge {
      display: inline-flex; align-items: center; padding: 2px 7px;
      border-radius: 2px; font-size: 9px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .8px; font-family: var(--mono);
      border: 1px solid;
    }
    .badge.good   { color: var(--green); border-color: rgba(52,211,153,.25);  background: var(--gdim); }
    .badge.warn   { color: var(--amber); border-color: rgba(245,158,11,.25);  background: rgba(245,158,11,.08); }
    .badge.bad    { color: var(--red);   border-color: rgba(239,68,68,.25);   background: var(--rdim); }
    .badge.info   { color: var(--blue);  border-color: rgba(45,212,191,.25);  background: var(--bdim); }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 6px 12px; font-size: 10px; font-weight: 700;
      border-radius: var(--r); border: 1px solid var(--border);
      background: var(--input); color: var(--dim); cursor: pointer;
      transition: all .1s; font-family: var(--mono); letter-spacing: .4px;
      text-transform: uppercase; white-space: nowrap;
    }
    .btn:hover { border-color: var(--bhl); color: var(--text); background: var(--hover); }
    .btn.primary { background: var(--accent); color: #0a1a12; border-color: var(--accent); }
    .btn.primary:hover { opacity: .88; }
    .btn.sm { padding: 3px 8px; font-size: 9px; }
    .btn svg { width: 11px; height: 11px; stroke: currentColor; fill: none; stroke-width: 2; }

    /* ── Field ── */
    .field { margin-bottom: 9px; }
    .field label {
      display: block; font-size: 9px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; font-family: var(--mono);
    }
    .field input {
      width: 100%; padding: 6px 10px;
      background: var(--input); border: 1px solid var(--border);
      border-radius: var(--r); color: var(--text);
      font-family: var(--mono); font-size: 12px; transition: border-color .15s;
    }
    .field input:focus { outline: none; border-color: var(--accent); }
    .field input::placeholder { color: var(--muted); }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .field-row .field { margin-bottom: 0; }

    .msg { padding: 6px 10px; border-radius: var(--r); font-size: 11px; font-family: var(--mono); margin-top: 8px; display: none; }
    .msg.ok  { display: block; background: var(--gdim); color: var(--green); border: 1px solid rgba(52,211,153,.2); }
    .msg.err { display: block; background: var(--rdim); color: var(--red);   border: 1px solid rgba(239,68,68,.2); }

    /* ── Summary table ── */
    .summary-table { width: 100%; border-collapse: collapse; font-size: 11px; }
    .summary-table td { padding: 6px 10px; border-bottom: 1px solid var(--border); font-family: var(--mono); }
    .summary-table tr:last-child td { border-bottom: none; }
    .summary-table td:last-child { text-align: right; color: var(--dim); }

    .no-data { color: var(--muted); padding: 32px 0; text-align: center; font-family: var(--mono); font-size: 11px; }
    .btn-row  { display: flex; gap: 8px; justify-content: flex-end; margin-top: 12px; }
  </style>
</head>
<body>
<div id="app"><div style="color:var(--muted);padding:32px 16px;text-align:center;font-family:var(--mono);font-size:12px">Loading spike detector data…</div></div>

<script>
  (function(){
    const p = new URLSearchParams(location.search), t = p.get('theme');
    if (t && t !== 'default') document.documentElement.setAttribute('data-theme', t);
    window.addEventListener('message', function(e){
      if (e.data && e.data.type === 'ip-theme-change') {
        const th = e.data.theme;
        if (!th || th === 'default') document.documentElement.removeAttribute('data-theme');
        else document.documentElement.setAttribute('data-theme', th);
      }
    });
  })();

  const API = location.origin;
  let state       = { status: {}, servers: [], config: {}, nameByExtenderId: {} };
  let viewMode    = 'list';
  let selectedServer = null;
  let firstRender = true;

  async function api(path, opts = {}) {
    const h = { 'Content-Type': 'application/json' };
    const r = await fetch(API + '/api/modules/spike-detector/' + path, { ...opts, headers: h, credentials: 'same-origin' });
    const d = await r.json().catch(() => ({}));
    if (!r.ok) throw d;
    return d;
  }
  async function rootApi(path, opts = {}) {
    const h = { 'Content-Type': 'application/json' };
    const r = await fetch(API + path, { ...opts, headers: h, credentials: 'same-origin' });
    const d = await r.json().catch(() => ({}));
    if (!r.ok) throw d;
    return d;
  }
  function esc(s) { return s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;') : ''; }
  function num(v) { const n = Number(v); return Number.isFinite(n) ? n : 0; }
  function fa()   { return firstRender ? ' fade-in' : ''; }
  function su()   { return firstRender ? ' slide-up' : ''; }

  async function load() {
    try {
      const [status, servers, config, rootStatus] = await Promise.all([
        api('status'),
        api('servers'),
        api('config'),
        rootApi('/api/status').catch(() => ({ servers: [] }))
      ]);

      const nameByExtenderId = {};
      (rootStatus.servers || []).forEach(v => {
        if (v && v.extender_enrolled && v.extender_id && v.name)
          nameByExtenderId[String(v.extender_id)] = String(v.name);
      });

      const normalizedServers = ((servers && servers.servers) || []).map(row => ({
        ...row,
        display_name: nameByExtenderId[String(row.id || '')] || row.name || row.id
      }));

      state = { status: status || {}, servers: normalizedServers, config: config || {}, nameByExtenderId };
      render();
    } catch(e) {
      document.getElementById('app').innerHTML =
              '<div style="color:var(--red);padding:32px;text-align:center;font-family:var(--mono)">Failed to load Spike Detector data.</div>';
    }
    firstRender = false;
  }

  function render() {
    if (viewMode === 'detail' && selectedServer) {
      renderDetailView();
    } else {
      renderListView();
    }
  }

  function renderListView() {
    const s       = state.status || {};
    const cfg     = state.config || {};
    const servers = (state.servers || []).slice().sort((a, b) => num(b.top_tick_ms) - num(a.top_tick_ms));
    const critical = num(cfg.critical_tick_ms || s.critical_tick_ms || 140);
    const top     = servers[0] || null;
    const avgTop  = servers.length
            ? servers.reduce((a, r) => a + num(r.top_tick_ms), 0) / servers.length : 0;

    const topColor = top && num(top.top_tick_ms) >= critical ? 'red' : 'amber';

    document.getElementById('app').innerHTML = `
<div class="picker-header${fa()}">
  <div class="picker-title">Spike Detector</div>
  <div class="picker-subtitle">Chunk lag intelligence — Paper backends</div>
</div>

<div class="stat-grid${fa()}">
  <div class="stat-cell">
    <div class="stat-label">Most Impacted</div>
    <div class="stat-value ${topColor}" style="font-size:14px;letter-spacing:-.2px;margin-top:4px">${esc(top ? top.display_name : '—')}</div>
    <div style="font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:2px">${top ? num(top.top_tick_ms).toFixed(1) + ' ms top tick' : 'No data'}</div>
  </div>
  <div class="stat-cell"><div class="stat-label">Warn Spikes</div><div class="stat-value amber">${num(s.warn_spikes)}</div></div>
  <div class="stat-cell"><div class="stat-label">Critical Spikes</div><div class="stat-value red">${num(s.critical_spikes)}</div></div>
  <div class="stat-cell">
    <div class="stat-label">Auto Mitigate</div>
    <div class="stat-value ${s.auto_mitigate_critical ? 'green' : 'amber'}">${s.auto_mitigate_critical ? 'On' : 'Off'}</div>
  </div>
</div>

<div class="cols${su()}">
  <div>
    <div class="chart-panel">
      <div class="chart-panel-header">
        <div class="chart-panel-title">Spike Pressure Map</div>
      </div>
      <div class="chart-legend">
        <div class="chart-legend-item"><div class="chart-legend-dot" style="background:var(--amber)"></div>Top tick (ms)</div>
        <div class="chart-legend-item"><div class="chart-legend-dot" style="background:var(--red)"></div>Critical chunks</div>
        <div class="chart-legend-item"><div class="chart-legend-dot" style="background:var(--blue)"></div>Flagged chunks</div>
      </div>
      <div class="chart-canvas-wrap"><canvas id="spikeChart" height="220"></canvas></div>
    </div>

    <div class="card">
      <div class="card-title">
        <svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="8" rx="2" ry="2"/><rect x="2" y="14" width="20" height="8" rx="2" ry="2"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/></svg>
        Server Queue
      </div>
      ${!servers.length ? '<div class="no-data">No profiling reports yet</div>' : `
      <table class="data-table">
        <thead><tr>
          <th>Server</th><th>Flagged</th><th>Critical</th><th>Top Tick</th><th></th>
        </tr></thead>
        <tbody>
          ${servers.map(row => `<tr>
            <td style="font-weight:600">${esc(row.display_name || row.name)}</td>
            <td>${num(row.flagged)}</td>
            <td style="color:${num(row.critical_count) > 0 ? 'var(--red)' : 'inherit'}">${num(row.critical_count)}</td>
            <td style="color:${num(row.top_tick_ms) >= critical ? 'var(--red)' : 'var(--amber)'}">${num(row.top_tick_ms).toFixed(1)} ms</td>
            <td style="text-align:right">
              <button class="btn sm" onclick="openServer('${esc(row.id || row.name)}')">
                <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
                Inspect
              </button>
            </td>
          </tr>`).join('')}
        </tbody>
      </table>`}
    </div>
  </div>

  <div>
    <div class="card">
      <div class="card-title">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
        Configuration
      </div>
      <div class="field-row" style="margin-bottom:8px">
        <div class="field"><label>Warn Tick (ms)</label><input id="warn_tick_ms" value="${num(cfg.warn_tick_ms)}"></div>
        <div class="field"><label>Critical Tick (ms)</label><input id="critical_tick_ms" value="${num(cfg.critical_tick_ms)}"></div>
      </div>
      <div class="field-row" style="margin-bottom:14px">
        <div class="field"><label>Top Chunks</label><input id="top_chunks" value="${num(cfg.top_chunks)}"></div>
        <div class="field"><label>Profile Interval (sec)</label><input id="profiling_interval_sec" value="${num(cfg.profiling_interval_sec)}"></div>
      </div>
      <div class="btn-row">
        <button class="btn" onclick="load()">
          <svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
          Refresh
        </button>
        <button class="btn primary" onclick="saveCfg()">
          <svg viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          Save
        </button>
      </div>
      <div id="cfgMsg" class="msg"></div>
    </div>

    <div class="card">
      <div class="card-title">
        <svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        Summary
      </div>
      <table class="summary-table">
        <tr><td>Connected servers</td><td>${num(s.servers)}</td></tr>
        <tr><td>Average top tick</td><td>${avgTop.toFixed(1)} ms</td></tr>
        <tr><td>Warn threshold</td><td>${num(cfg.warn_tick_ms)} ms</td></tr>
        <tr><td>Critical threshold</td><td>${num(cfg.critical_tick_ms)} ms</td></tr>
        <tr><td>Top chunks tracked</td><td>${num(cfg.top_chunks)}</td></tr>
      </table>
    </div>
  </div>
</div>`;

    drawSpikeChart(servers);
  }

  async function renderDetailView() {
    try {
      const d = await api('server/' + encodeURIComponent(selectedServer));
      const displayName = (state.nameByExtenderId && state.nameByExtenderId[String(selectedServer)]) || d.name || selectedServer;

      document.getElementById('app').innerHTML = `
<div class="topbar${fa()}">
  <button class="back-btn" onclick="goBack()"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
  <div>
    <div class="topbar-title">${esc(displayName)}</div>
    <div class="topbar-sub">Flagged chunks — Spike Detector</div>
  </div>
</div>

<div class="card${su()}">
  <div class="card-title">
    <svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
    Flagged Chunks
  </div>
  ${!(d.flagged && d.flagged.length) ? '<div class="no-data">No flagged chunks for this server</div>' : `
  <table class="data-table">
    <thead><tr>
      <th>Severity</th><th>World / Chunk</th><th>Tick (ms)</th><th>Entities</th><th>Tiles</th><th></th>
    </tr></thead>
    <tbody>
      ${(d.flagged || []).map(c => `<tr>
        <td>${c.critical ? '<span class="badge bad">Critical</span>' : '<span class="badge warn">Warn</span>'}</td>
        <td style="font-family:var(--mono)">${esc(c.world)} [${c.x}, ${c.z}]</td>
        <td style="color:${c.critical ? 'var(--red)' : 'var(--amber)'}">${num(c.tickMs).toFixed(2)}</td>
        <td>${num(c.entityCount)}</td>
        <td>${num(c.tileEntityCount)}</td>
        <td style="text-align:right">
          <button class="btn sm" onclick="mitigate('${esc(selectedServer)}','${esc(c.world)}',${c.x},${c.z})">Mitigate</button>
        </td>
      </tr>`).join('')}
    </tbody>
  </table>`}
  <div class="btn-row"><button class="btn" onclick="goBack()"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg> Back</button></div>
</div>`;
    } catch(e) {
      document.getElementById('app').innerHTML =
              '<div style="color:var(--red);padding:32px;text-align:center;font-family:var(--mono)">Failed to load server details.</div>';
    }
  }

  function openServer(id) { selectedServer = id; viewMode = 'detail'; renderDetailView(); }
  function goBack()       { viewMode = 'list'; selectedServer = null; render(); }

  async function mitigate(server, world, x, z) {
    try {
      await api('mitigate/' + encodeURIComponent(server) + '/' + encodeURIComponent(world) + '/' + x + '/' + z, { method: 'POST' });
      await renderDetailView();
    } catch(e) { alert('Mitigation failed'); }
  }

  async function saveCfg() {
    const msg = document.getElementById('cfgMsg');
    try {
      await api('config', { method: 'POST', body: JSON.stringify({
          warn_tick_ms:          Number(document.getElementById('warn_tick_ms').value),
          critical_tick_ms:      Number(document.getElementById('critical_tick_ms').value),
          top_chunks:            Number(document.getElementById('top_chunks').value),
          profiling_interval_sec:Number(document.getElementById('profiling_interval_sec').value),
        })});
      msg.className = 'msg ok'; msg.textContent = 'Configuration saved';
      await load();
    } catch(e) { msg.className = 'msg err'; msg.textContent = e.error || 'Failed'; }
  }

  function drawSpikeChart(rows) {
    const canvas = document.getElementById('spikeChart');
    if (!canvas) return;
    const ctx  = canvas.getContext('2d');
    const dpr  = window.devicePixelRatio || 1;
    const w    = Math.max(200, canvas.parentElement.clientWidth - 8);
    const h    = 220;
    canvas.width  = w * dpr; canvas.height = h * dpr;
    canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
    ctx.scale(dpr, dpr); ctx.clearRect(0, 0, w, h);

    const css    = getComputedStyle(document.documentElement);
    const cAmber = css.getPropertyValue('--amber').trim() || '#f59e0b';
    const cRed   = css.getPropertyValue('--red').trim()   || '#ef4444';
    const cBlue  = css.getPropertyValue('--blue').trim()  || '#2dd4bf';
    const cMuted = css.getPropertyValue('--muted').trim() || '#30604a';

    if (!rows.length) {
      ctx.fillStyle = cMuted; ctx.font = '11px IBM Plex Mono, monospace';
      ctx.fillText('No data yet', 12, 24); return;
    }

    const top     = rows.slice(0, 8);
    const maxTick = Math.max(1, ...top.map(r => num(r.top_tick_ms)));
    const maxCrit = Math.max(1, ...top.map(r => num(r.critical_count)));
    const maxFlag = Math.max(1, ...top.map(r => num(r.flagged)));

    const left = 44, right = w - 8, bottom = h - 28, topY = 10;
    const plotW = right - left, plotH = bottom - topY;
    const step  = plotW / top.length;

    // Grid
    ctx.strokeStyle = 'rgba(80,110,150,.15)'; ctx.lineWidth = 1;
    for (let i = 0; i < 5; i++) {
      const y = topY + plotH * (i / 4);
      ctx.beginPath(); ctx.moveTo(left, y); ctx.lineTo(right, y); ctx.stroke();
      ctx.fillStyle = cMuted; ctx.font = '9px IBM Plex Mono, monospace';
      ctx.textAlign = 'right';
      ctx.fillText((maxTick * (1 - i / 4)).toFixed(0), left - 4, y + 3);
    }
    ctx.textAlign = 'left';

    // Bars
    top.forEach((r, i) => {
      const x   = left + i * step + step * 0.06;
      const bw  = Math.max(6, step * 0.20);
      const gap = 3;

      const tickH = (num(r.top_tick_ms)    / maxTick) * plotH;
      const critH = (num(r.critical_count) / maxCrit) * plotH;
      const flagH = (num(r.flagged)         / maxFlag) * plotH;

      drawBar(ctx, x,             bottom - tickH, bw, tickH, cAmber);
      drawBar(ctx, x + bw + gap,  bottom - critH, bw, critH, cRed);
      drawBar(ctx, x + (bw+gap)*2,bottom - flagH, bw, flagH, cBlue);

      ctx.fillStyle = cMuted; ctx.font = '9px IBM Plex Mono, monospace';
      const label = String(r.display_name || r.name || '?').slice(0, 9);
      ctx.fillText(label, x, bottom + 14);
    });
  }

  function drawBar(ctx, x, y, w, h, color) {
    if (h <= 0) return;
    const r = Math.min(2, h / 2, w / 2);
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(x, y + h);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h);
    ctx.closePath();
    ctx.fill();
  }

  load();
  setInterval(load, 10000);
  window.addEventListener('resize', () => { if (viewMode === 'list') drawSpikeChart(state.servers || []); });
</script>
</body>
</html>
