<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profiler - IntegrityPolygon</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root{--bg:#0b1220;--surface:#111a2f;--card:#16213b;--border:#24314d;--border-hl:#3a4d74;--text:#e5ecff;--dim:#9ba9c7;--muted:#6f7d98;--accent:#4f7cff;--accent-dim:rgba(79,124,255,.16);--blue:#3fb0ff;--green:#26c281;--amber:#f3a83b;--red:#ef5b67;--r:6px;--font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;--mono:'JetBrains Mono','SF Mono',Consolas,monospace}
        [data-theme="midnight"]{--bg:#0f1016;--surface:#171922;--card:#1d2130;--border:#2a3044;--border-hl:#3b4560;--text:#e7e9f5;--dim:#a8afc9;--muted:#7c86a3;--accent:#7d8bff;--accent-dim:rgba(125,139,255,.16);--blue:#58a2ff}
        [data-theme="nord"]{--bg:#2e3440;--surface:#3b4252;--card:#434c5e;--border:#5b6477;--border-hl:#7b869f;--text:#eceff4;--dim:#d0d7e4;--muted:#a1aec6;--accent:#88c0d0;--accent-dim:rgba(136,192,208,.18);--blue:#81a1c1;--red:#bf616a;--amber:#ebcb8b;--green:#a3be8c}
        [data-theme="emerald"]{--bg:#051612;--surface:#0c201b;--card:#123029;--border:#214b3f;--border-hl:#2f6657;--text:#dbf2e8;--dim:#9ecdb8;--muted:#6da48d;--accent:#34d399;--accent-dim:rgba(52,211,153,.16);--blue:#2dd4bf}
        [data-theme="light"]{--bg:#f5f7fb;--surface:#ffffff;--card:#f8faff;--border:#dde4f3;--border-hl:#c4d0e8;--text:#1d2433;--dim:#58627a;--muted:#818aa1;--accent:#2f6bff;--accent-dim:rgba(47,107,255,.12);--blue:#2f88ff;--red:#dd4452;--amber:#b97a1c;--green:#12935e}
        [data-theme="rose"]{--bg:#1a1117;--surface:#241823;--card:#2f1f2d;--border:#4d3350;--border-hl:#654768;--text:#f3e3ee;--dim:#c79cb8;--muted:#9c7890;--accent:#f278a4;--accent-dim:rgba(242,120,164,.18);--blue:#c188ff}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:var(--font),sans-serif;background:transparent;color:var(--text);padding:0;font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased;overflow-x:hidden}
        #app{padding:14px}
        @keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
        @keyframes slideUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
        .fade-in{animation:fadeIn .25s ease both}
        .slide-up{animation:slideUp .28s ease both}

        .card,.chart-card,.server-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r)}
        .card{padding:14px 16px;margin-bottom:12px}
        .card h3{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.9px;color:var(--dim);margin-bottom:10px;display:flex;align-items:center;gap:8px}
        .card h3 svg{width:14px;height:14px;stroke:var(--dim);fill:none;stroke-width:2}

        .server-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:12px;margin-bottom:16px}
        .server-card{padding:14px;transition:border-color .16s,transform .16s;cursor:pointer}
        .server-card:hover{border-color:var(--border-hl);transform:translateY(-1px)}
        .server-card .title{font-size:16px;font-weight:700}
        .server-card .meta{margin-top:6px;color:var(--dim);font-size:12px}
        .server-card .badges{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
        .badge{padding:3px 8px;border-radius:999px;border:1px solid var(--border);font-size:11px;color:var(--dim)}
        .badge.good{border-color:rgba(38,194,129,.5);color:var(--green)}
        .badge.warn{border-color:rgba(243,168,59,.5);color:var(--amber)}
        .server-card .actions{display:flex;gap:8px;margin-top:12px}

        .btn{padding:8px 14px;border-radius:var(--r);border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;font-size:12px;font-weight:600;font-family:var(--font),sans-serif;transition:all .14s}
        .btn:hover{border-color:var(--accent);color:var(--accent)}
        .btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
        .btn.primary:hover{filter:brightness(1.06)}

        .topbar{display:flex;align-items:center;gap:10px;margin-bottom:12px}
        .back-arrow{width:34px;height:34px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border);border-radius:var(--r);background:var(--surface);cursor:pointer;color:var(--text);font-size:18px;line-height:1}
        .back-arrow:hover{border-color:var(--accent);color:var(--accent)}
        .prof-icon{width:34px;height:34px;border-radius:var(--r);background:var(--surface);border:1px solid var(--border-hl);display:flex;align-items:center;justify-content:center;flex-shrink:0}
        .prof-icon svg{width:18px;height:18px;stroke:var(--accent);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
        .topbar-title{font-size:15px;font-weight:700;letter-spacing:.01em}

        .top-groups{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px;margin-bottom:16px}
        .group-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px}
        .group-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.9px;color:var(--dim);margin-bottom:10px}
        .group-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
        .metric-label{font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:var(--muted)}
        .metric-value{font-size:19px;line-height:1.2;font-weight:700;font-variant-numeric:tabular-nums;margin-top:2px}
        .metric-value.good{color:var(--green)}.metric-value.warn{color:var(--amber)}.metric-value.bad{color:var(--red)}.metric-value.hl{color:var(--accent)}
        .metric-sub{font-size:11px;color:var(--dim);margin-top:1px}

        .charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
        @media(max-width:700px){.charts-grid{grid-template-columns:1fr}}
        .chart-card{padding:14px 16px}
        .chart-card h3{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--dim);margin-bottom:8px}
        .chart-card canvas{width:100%;height:84px;display:block}

        .method-tree{font-family:var(--mono),monospace;font-size:12px}
        .tree-node{border-left:1px solid var(--border);margin-left:8px;padding-left:10px;margin-top:2px}
        .tree-row{display:flex;align-items:center;gap:8px;padding:5px 6px;border-radius:var(--r);cursor:pointer;transition:background .1s}
        .tree-row:hover{background:var(--card)}
        .tree-toggle{width:14px;height:14px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:10px;transition:transform .15s;flex-shrink:0}
        .tree-toggle.open{transform:rotate(90deg)}
        .tree-toggle.leaf{visibility:hidden}
        .tree-bar{width:64px;height:6px;background:var(--border);border-radius:2px;overflow:hidden;flex-shrink:0}
        .tree-bar-fill{height:100%;transition:width .3s}
        .tree-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
        .tree-name .pkg{color:var(--muted)}
        .tree-name .cls{color:var(--blue)}
        .tree-name .mtd{color:var(--accent)}
        .tree-pct{font-weight:600;min-width:50px;text-align:right;font-variant-numeric:tabular-nums}
        .tree-samples{color:var(--muted);min-width:64px;text-align:right;font-size:11px}
        .tree-children{overflow:hidden;transition:max-height .2s ease}
        .tree-children.collapsed{max-height:0!important}

        table{width:100%;border-collapse:collapse;font-size:12px}
        th{text-align:left;font-weight:600;color:var(--dim);font-size:10px;text-transform:uppercase;letter-spacing:.7px;padding:8px 10px;border-bottom:1px solid var(--border)}
        td{padding:8px 10px;border-bottom:1px solid var(--border)}
        .filters{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
        .filters input{background:var(--card);color:var(--text);border:1px solid var(--border);border-radius:var(--r);padding:7px 10px;font-size:12px;font-family:var(--font),sans-serif;min-width:200px}
        .collapse-all-btn{font-size:11px;color:var(--dim);cursor:pointer;padding:6px 10px;border:1px solid var(--border);border-radius:var(--r);background:var(--surface);font-family:var(--font),sans-serif}
        .no-data{color:var(--muted);padding:40px;text-align:center;font-size:13px}
    </style>
</head>
<body>
<div id="app"><div class="no-data">Loading profiling data...</div></div>

<script>
(function(){
  const p=new URLSearchParams(location.search),t=p.get('theme');
  if(t&&t!=='default')document.documentElement.setAttribute('data-theme',t);
  window.addEventListener('message',function(e){
    if(e.data&&e.data.type==='ip-theme-change'){
      const th=e.data.theme;
      if(!th||th==='default')document.documentElement.removeAttribute('data-theme');
      else document.documentElement.setAttribute('data-theme',th);
    }
  });
})();

const token=new URLSearchParams(location.search).get('token');
const API=location.origin;
const MAX_HIST=30;
let selectedServer=null;
let selectedServerLabel=null;
let viewMode='list';
let firstRender=true;
let tpsHistory={};
let cpuHistory={};
let openNodes=new Set();
let totalSamples=1;

async function api(path,opts={}){
  const h={'Content-Type':'application/json','Authorization':'Bearer '+token};
  const r=await fetch(API+'/api/modules/profiler/'+path,{...opts,headers:h});
  const d=await r.json().catch(()=>({}));
  if(!r.ok)throw d;
  return d;
}
async function rootApi(path,opts={}){
  const h={'Content-Type':'application/json','Authorization':'Bearer '+token};
  const r=await fetch(API+path,{...opts,headers:h});
  const d=await r.json().catch(()=>({}));
  if(!r.ok)throw d;
  return d;
}
function esc(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):'';}
function num(v,d=0){const n=Number(v);return Number.isFinite(n)?n:d;}
function numStr(v,d=1,f='0.0'){const n=Number(v);return Number.isFinite(n)?n.toFixed(d):f;}
function classify(v,w,b,a=true){const n=num(v,0);return a?(n>=w?'good':n>=b?'warn':'bad'):(n<=w?'good':n<=b?'warn':'bad');}
function ageLabel(ts){const t=num(ts,0);if(t<=0)return 'n/a';const s=Math.max(0,Math.floor((Date.now()-t)/1000));if(s<60)return s+'s ago';const m=Math.floor(s/60);if(m<60)return m+'m ago';return Math.floor(m/60)+'h ago';}
function anim(cls){return firstRender?cls:'';}
function encodeArg(v){return encodeURIComponent(String(v||''));}

async function render(){
  try{
    const status=await api('status');
    const srvResp=await api('servers');
    const srvList=srvResp.servers||[];
    let targets=[];
    let velocityStatus={servers:[]};
    try{const tResp=await api('targets');targets=tResp.servers||[];}catch(e){}
    try{velocityStatus=await rootApi('/api/status');}catch(e){}

    if(viewMode==='detail' && (!selectedServer || !srvList.find(s=>s.name===selectedServer))){
      viewMode='list';
    }

    if(viewMode==='list'){
      renderServerPicker(status,srvList,targets,velocityStatus.servers||[]);
    }else{
      await renderServerDetail(status,srvList,targets,velocityStatus.servers||[]);
    }

    firstRender=false;
  }catch(e){
    document.getElementById('app').innerHTML='<div class="no-data">'+esc(e.error||e.message||'Failed to load profiling data')+'</div>';
    firstRender=false;
  }
}

function renderServerPicker(status,srvList,targets,velocityServers){
  const nameByExtenderId={};
  (velocityServers||[]).forEach(v=>{
    if(v && v.extender_enrolled && v.extender_id && v.name){
      nameByExtenderId[String(v.extender_id)] = String(v.name);
    }
  });

  if(!targets.length){
    document.getElementById('app').innerHTML='<div class="no-data">No deployable extender servers found.</div>';
    return;
  }

  let html='<div class="server-grid '+anim('slide-up')+'">';
  targets.forEach(t=>{
    const dashboardName=t.name||t.server||t.extender_id||'Unknown';
    const mappedName=nameByExtenderId[String(t.extender_id||'')] || null;
    const name=mappedName || dashboardName;
    const id=t.identifier||t.extender_id||name;
    const hasData=!!t.has_data;
    const extended=!!t.extended;
    const tps=num(t.tps,0);
    const players=num(t.players,0);
    const cardClass=hasData?'good':'warn';
    html+='<div class="server-card"'+(hasData?' onclick="openServerByEncoded(\''+encodeArg(dashboardName)+'\',\''+encodeArg(name)+'\')"':'')+'>'+
      '<div class="title">'+esc(name)+'</div>'+
      '<div class="meta">'+esc((t.server_ip||'?')+':'+num(t.server_port,0))+'</div>'+
      '<div class="badges">'+
        '<span class="badge '+cardClass+'">'+(hasData?'Receiving data':'No profiler data')+'</span>'+
        '<span class="badge '+(extended?'good':'warn')+'">'+(extended?'Extended':'Not extended')+'</span>'+
      '</div>'+
      '<div class="meta" style="margin-top:10px">Players: '+players+' | TPS: '+numStr(tps,1)+'</div>'+
      '<div class="actions">'+
        (hasData?'<button class="btn primary" onclick="event.stopPropagation();openServerByEncoded(\''+encodeArg(dashboardName)+'\',\''+encodeArg(name)+'\')">Open Dashboard</button>':'')+
        '<button class="btn'+(extended?'':' primary')+'" onclick="event.stopPropagation();extendServerByEncoded(\''+encodeArg(id)+'\',this)">'+(extended?'Re-Deploy':'Deploy Extender')+'</button>'+
      '</div>'+
    '</div>';
  });
  html+='</div>';

  if(!srvList.length){
    html+='<div class="no-data">No servers are currently reporting profiling data.</div>';
  }
  document.getElementById('app').innerHTML=html;
}

async function renderServerDetail(status,srvList,targets,velocityServers){
  const detail=await api('server/'+encodeURIComponent(selectedServer));
  const srv=srvList.find(s=>s.name===selectedServer)||{};
  const target=targets.find(t=>t&&t.name===selectedServer)||{};

  if(!tpsHistory[selectedServer])tpsHistory[selectedServer]=[];
  if(!cpuHistory[selectedServer])cpuHistory[selectedServer]=[];
  tpsHistory[selectedServer].push(num(detail.tps_10s ?? srv.tps_10s, 0));
  const cpuSample=num(detail.process_cpu ?? srv.process_cpu ?? detail.system_cpu ?? srv.system_cpu, -1);
  cpuHistory[selectedServer].push(Math.max(cpuSample,0));
  if(tpsHistory[selectedServer].length>MAX_HIST)tpsHistory[selectedServer].shift();
  if(cpuHistory[selectedServer].length>MAX_HIST)cpuHistory[selectedServer].shift();

  const tps=num(detail.tps_10s ?? srv.tps_10s, 0);
  const mspt=num(detail.mspt_mean ?? srv.mspt_mean, 0);
  const cpu=num(detail.process_cpu ?? srv.process_cpu ?? detail.system_cpu ?? srv.system_cpu, -1);
  const memUsed=num(detail.heap_used_mb ?? srv.heap_used_mb, 0);
  const memMax=num(detail.heap_max_mb ?? srv.heap_max_mb, 0);
  const players=num(detail.players ?? srv.players ?? target.players, 0);
  const gcPerMin=num(detail.gc_frequency_per_min, 0);
  const gcPause=num(detail.gc_avg_pause_ms, 0);
  const sampleInterval=num(detail.sample_interval_ms ?? srv.sample_interval_ms ?? status.sample_interval_ms, 0);
  const reportInterval=num(detail.report_interval_sec ?? srv.report_interval_sec ?? status.report_interval_sec, 0);
  const totalSamples=num(detail.total_samples, 0);
  const dataFreshness=ageLabel(detail.last_update ?? srv.last_update);
  const memPct=memMax>0?Math.round(memUsed/memMax*100):0;

  const nameByExtenderId={};
  (velocityServers||[]).forEach(v=>{ if(v && v.extender_enrolled && v.extender_id && v.name){ nameByExtenderId[String(v.extender_id)] = String(v.name);} });
  const displayName = selectedServerLabel || nameByExtenderId[String(target.extender_id||'')] || selectedServer;

  let html='<div class="topbar '+anim('fade-in')+'">'+
    '<button class="back-arrow" onclick="backToServers()" aria-label="Back">&#8592;</button>'+
    '<div class="prof-icon"><svg viewBox="0 0 24 24"><path d="M4 14a8 8 0 1 1 16 0"/><path d="M12 14l3-4"/><circle cx="12" cy="14" r="1.5"/></svg></div>'+
    '<div class="topbar-title">'+esc(displayName)+'</div>'+
  '</div>';
  html+='<div class="top-groups '+anim('slide-up')+'">'+
    '<div class="group-card"><div class="group-title">Runtime Health</div><div class="group-grid">'+
      '<div><div class="metric-label">TPS</div><div class="metric-value '+classify(tps,19,15,true)+'">'+numStr(tps,1)+'</div></div>'+
      '<div><div class="metric-label">MSPT</div><div class="metric-value '+classify(mspt,30,45,false)+'">'+numStr(mspt,1)+'ms</div></div>'+
      '<div><div class="metric-label">CPU</div><div class="metric-value '+(cpu<0?'hl':classify(cpu,60,80,false))+'">'+(cpu>=0?numStr(cpu,1)+'%':'N/A')+'</div></div>'+
      '<div><div class="metric-label">Players</div><div class="metric-value hl">'+players+'</div></div>'+
    '</div></div>'+
    '<div class="group-card"><div class="group-title">Memory</div><div class="group-grid">'+
      '<div><div class="metric-label">Heap Usage</div><div class="metric-value '+classify(memPct,70,85,false)+'">'+memPct+'%</div></div>'+
      '<div><div class="metric-label">Heap Size</div><div class="metric-value">'+memUsed+'/'+memMax+'</div><div class="metric-sub">MB</div></div>'+
      '<div><div class="metric-label">GC / Min</div><div class="metric-value">'+numStr(gcPerMin,1)+'</div></div>'+
      '<div><div class="metric-label">Avg Pause</div><div class="metric-value">'+numStr(gcPause,2)+'</div><div class="metric-sub">ms</div></div>'+
    '</div></div>'+
    '<div class="group-card"><div class="group-title">Sampling</div><div class="group-grid">'+
      '<div><div class="metric-label">Sample Interval</div><div class="metric-value">'+sampleInterval+'</div><div class="metric-sub">ms</div></div>'+
      '<div><div class="metric-label">Report Interval</div><div class="metric-value">'+reportInterval+'</div><div class="metric-sub">sec</div></div>'+
      '<div><div class="metric-label">Total Samples</div><div class="metric-value">'+totalSamples+'</div></div>'+
      '<div><div class="metric-label">Last Update</div><div class="metric-value">'+dataFreshness+'</div></div>'+
    '</div></div>'+
  '</div>';

  html+='<div class="charts-grid '+anim('slide-up')+'" style="animation-delay:.05s">'+
      '<div class="chart-card"><h3>TPS History</h3><canvas id="tpsChart" height="80"></canvas></div>'+
      '<div class="chart-card"><h3>CPU History</h3><canvas id="cpuChart" height="80"></canvas></div>'+
    '</div>';

  const pluginData=detail.hot_method_tree;
  if(pluginData && pluginData.plugins && pluginData.plugins.length){
    html+='<div class="card '+anim('slide-up')+'" style="animation-delay:.1s"><h3>Top Plugins / Subsystems</h3><table><thead><tr><th>Name</th><th>CPU %</th><th>Samples</th><th>Impact</th></tr></thead><tbody>';
    pluginData.plugins.forEach(p=>{
      const isInfra=p.is_infrastructure;
      const color=isInfra?'var(--accent)':(p.percent>10?'var(--red)':p.percent>5?'var(--amber)':'var(--green)');
      html+='<tr><td style="font-weight:600">'+esc(p.name)+'</td><td style="color:'+color+';font-weight:600">'+numStr(p.percent,1)+'</td><td>'+num(p.samples,0)+'</td><td><div class="tree-bar"><div class="tree-bar-fill" style="width:'+Math.min(num(p.percent,0)*2,100)+'%;background:'+color+'"></div></div></td></tr>';
    });
    html+='</tbody></table></div>';
  }

  const hotTree=detail.hot_method_tree;
  const topMethods=detail.top_methods||[];
  html+='<div class="card '+anim('slide-up')+'" style="animation-delay:.12s"><h3>Sample Tree (Plugins/Subsystems)</h3>';
  if(hotTree && hotTree.plugins && hotTree.plugins.length){
    html+='<div class="filters"><input type="text" id="treeFilter" placeholder="Filter classes/methods..." oninput="filterTree()"><label><input type="checkbox" id="hideJava" onchange="filterTree()||renderHotTree(window.__hotTree)" checked> Hide Server/JVM Subsystems</label><button class="collapse-all-btn" onclick="collapseAll()">Collapse All</button><button class="collapse-all-btn" onclick="expandAll()">Expand All</button></div><div class="method-tree" id="methodTree"></div>';
  } else if(topMethods.length){
    html+='<table><thead><tr><th>Method</th><th>Samples</th><th>%</th><th>Impact</th></tr></thead><tbody>';
    topMethods.forEach(m=>{
      const pct=num(m.percent!==undefined?m.percent:m.percentage,0);
      const color=pct>10?'var(--red)':pct>5?'var(--amber)':'var(--accent)';
      html+='<tr><td style="font-family:var(--mono),monospace;font-size:11px">'+esc(m.method||m.name||'?')+'</td><td>'+num(m.count||m.samples,0)+'</td><td style="font-weight:600;color:'+color+'">'+numStr(pct,1)+'</td><td><div class="tree-bar"><div class="tree-bar-fill" style="width:'+Math.min(pct*2,100)+'%;background:'+color+'"></div></div></td></tr>';
    });
    html+='</tbody></table>';
  } else {
    html+='<div style="color:var(--muted);font-size:12px;padding:16px 0">No plugin profiling data yet. Wait for the next report.</div>';
  }
  html+='</div>';

  const gcCollectors=Array.isArray(detail.gc_collectors)?detail.gc_collectors:[];
  if(gcCollectors.length||detail.gc_collections!==undefined){
    html+='<div class="card '+anim('slide-up')+'" style="animation-delay:.15s"><h3>Garbage Collection</h3>';
    if(gcCollectors.length){
      html+='<table><thead><tr><th>Collector</th><th>Collections</th><th>Total Time</th><th>Avg Time</th></tr></thead><tbody>';
      gcCollectors.forEach(c=>{
        const count=num(c.collections,0),timeMs=num(c.collection_time_ms,0),avg=count>0?(timeMs/count).toFixed(1):'0';
        html+='<tr><td>'+esc(c.name)+'</td><td>'+count+'</td><td>'+timeMs+'ms</td><td>'+avg+'ms</td></tr>';
      });
      html+='</tbody></table>';
    }
    html+='</div>';
  }

  const appEl=document.getElementById('app');
  appEl.innerHTML=html;
  setTimeout(()=>{
    const css=getComputedStyle(document.documentElement);
    drawSparkline('tpsChart',tpsHistory[selectedServer]||[],{color:css.getPropertyValue('--accent').trim(),max:20});
    drawSparkline('cpuChart',cpuHistory[selectedServer]||[],{color:css.getPropertyValue('--blue').trim(),max:100,warnLine:80});
    window.__hotTree=hotTree;
    if(hotTree)renderHotTree(hotTree);
  },40);
}

function openServerByEncoded(v,label){selectedServer=decodeURIComponent(v);selectedServerLabel=label?decodeURIComponent(label):selectedServer;viewMode='detail';render();}
function backToServers(){viewMode='list';selectedServerLabel=null;render();}
async function extendServerByEncoded(v,btn){
  const name=decodeURIComponent(v);
  if(btn){btn.disabled=true;btn.textContent='Deploying...';}
  try{
    await api('extend/'+encodeURIComponent(name),{method:'POST'});
    if(btn){btn.textContent='Deployed';}
    setTimeout(render,1200);
  }catch(e){
    if(btn){btn.disabled=false;btn.textContent='Failed';}
    alert(e.error||'Failed to deploy profiler extender');
  }
}

function drawSparkline(id,data,opts={}){
  const canvas=document.getElementById(id);if(!canvas||data.length<2)return;
  const ctx=canvas.getContext('2d');
  const dpr=window.devicePixelRatio||1;
  const w=canvas.parentElement.clientWidth-32,h=80;
  canvas.width=w*dpr;canvas.height=h*dpr;
  canvas.style.width=w+'px';canvas.style.height=h+'px';
  ctx.scale(dpr,dpr);ctx.clearRect(0,0,w,h);

  let max=Math.max(...data,1);if(opts.max)max=Math.max(max,opts.max);
  const pad=4,gw=w-pad*2,gh=h-pad*2;
  const css=getComputedStyle(document.documentElement);

  ctx.strokeStyle=css.getPropertyValue('--border').trim()||'rgba(255,255,255,.08)';ctx.lineWidth=1;
  for(let i=0;i<4;i++){const y=pad+gh*(i/3);ctx.beginPath();ctx.moveTo(pad,y);ctx.lineTo(pad+gw,y);ctx.stroke();}
  if(opts.warnLine){const y=pad+gh*(1-opts.warnLine/max);ctx.strokeStyle=css.getPropertyValue('--red').trim();ctx.globalAlpha=.35;ctx.setLineDash([4,4]);ctx.beginPath();ctx.moveTo(pad,y);ctx.lineTo(pad+gw,y);ctx.stroke();ctx.setLineDash([]);ctx.globalAlpha=1;}

  ctx.beginPath();
  data.forEach((v,i)=>{const x=pad+(i/(data.length-1))*gw;const y=pad+gh*(1-v/max);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
  ctx.lineTo(pad+gw,pad+gh);ctx.lineTo(pad,pad+gh);ctx.closePath();
  const c=opts.color||'#22d3a7',grad=ctx.createLinearGradient(0,0,0,h);grad.addColorStop(0,c+'30');grad.addColorStop(1,c+'05');ctx.fillStyle=grad;ctx.fill();
  ctx.beginPath();
  data.forEach((v,i)=>{const x=pad+(i/(data.length-1))*gw;const y=pad+gh*(1-v/max);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
  ctx.strokeStyle=c;ctx.lineWidth=2;ctx.stroke();
}

function renderHotTree(hot_method_tree){
  const el=document.getElementById('methodTree');
  if(!el||!hot_method_tree||!hot_method_tree.plugins)return;
  const plugins=hot_method_tree.plugins;
  let maxSamples=0;plugins.forEach(p=>maxSamples+=p.samples);totalSamples=maxSamples||1;
  const hideJava=document.getElementById('hideJava')?.checked??true;
  let html='';plugins.forEach(p=>{if(hideJava&&p.is_infrastructure)return;html+=renderPluginNode(p);});
  el.innerHTML=html||'<div style="color:var(--dim);padding:10px">No matching subsystems found.</div>';
}
function renderPluginNode(p){
  const id='plug_'+p.name.replace(/[^a-zA-Z0-9]/g,'_'),pct=(p.samples/totalSamples)*100,barColor=p.is_infrastructure?'var(--accent)':(pct>20?'var(--red)':pct>10?'var(--amber)':'var(--green)'),isOpen=openNodes.has(id);
  let html='<div class="tree-row" onclick="toggleNode(\''+id+'\')" data-name="'+esc(p.name).toLowerCase()+'"><span class="tree-toggle '+(p.classes&&p.classes.length?'':'leaf')+' '+(isOpen?'open':'')+'" id="tog_'+id+'">></span><div class="tree-bar"><div class="tree-bar-fill" style="width:'+Math.min(pct*2,100)+'%;background:'+barColor+'"></div></div><span class="tree-name" style="font-weight:700">'+esc(p.name)+'</span><span class="tree-pct" style="color:'+barColor+'">'+pct.toFixed(1)+'%</span><span class="tree-samples">'+p.samples+' samples</span></div>';
  if(p.classes&&p.classes.length){html+='<div class="tree-children '+(isOpen?'':'collapsed')+'" id="ch_'+id+'">';p.classes.forEach(c=>{html+='<div class="tree-node">'+renderClassNode(c,p.name)+'</div>';});html+='</div>';}
  return html;
}
function renderClassNode(c,pluginName){
  const id='cls_'+(pluginName+'_'+c.name).replace(/[^a-zA-Z0-9]/g,'_'),pct=(c.samples/totalSamples)*100,barColor=pct>10?'var(--amber)':'var(--dim)',isOpen=openNodes.has(id),pkg=c.name.includes('.')?c.name.substring(0,c.name.lastIndexOf('.')):'',cls=c.name.includes('.')?c.name.substring(c.name.lastIndexOf('.')+1):c.name;
  let html='<div class="tree-row" onclick="toggleNode(\''+id+'\')" data-name="'+esc(c.name).toLowerCase()+'"><span class="tree-toggle '+(c.methods&&c.methods.length?'':'leaf')+' '+(isOpen?'open':'')+'" id="tog_'+id+'">></span><div class="tree-bar"><div class="tree-bar-fill" style="width:'+Math.min(pct*2,100)+'%;background:'+barColor+'"></div></div><span class="tree-name">'+(pkg?'<span class="pkg">'+esc(pkg)+'.</span>':'')+'<span class="cls">'+esc(cls)+'</span></span><span class="tree-pct" style="color:var(--text)">'+pct.toFixed(1)+'%</span><span class="tree-samples">'+c.samples+'</span></div>';
  if(c.methods&&c.methods.length){html+='<div class="tree-children '+(isOpen?'':'collapsed')+'" id="ch_'+id+'">';c.methods.forEach(m=>{html+='<div class="tree-node">'+renderMethodNode(m)+'</div>';});html+='</div>';}
  return html;
}
function renderMethodNode(m){const pct=(m.samples/totalSamples)*100,barColor=pct>5?'var(--accent)':'var(--dim)';return '<div class="tree-row leaf" data-name="'+esc(m.full_name||m.name).toLowerCase()+'"><span class="tree-toggle leaf">></span><div class="tree-bar"><div class="tree-bar-fill" style="width:'+Math.min(pct*2,100)+'%;background:'+barColor+'"></div></div><span class="tree-name"><span class="mtd">'+esc(m.name)+'()</span></span><span class="tree-pct" style="color:var(--text)">'+pct.toFixed(1)+'%</span><span class="tree-samples">'+m.samples+'</span></div>';}
function toggleNode(id){const ch=document.getElementById('ch_'+id),tog=document.getElementById('tog_'+id);if(!ch)return;ch.classList.toggle('collapsed');const isCollapsed=ch.classList.contains('collapsed');if(tog)tog.classList.toggle('open',!isCollapsed);if(isCollapsed)openNodes.delete(id);else openNodes.add(id);}
function collapseAll(){document.querySelectorAll('.tree-children').forEach(el=>el.classList.add('collapsed'));document.querySelectorAll('.tree-toggle').forEach(el=>el.classList.remove('open'));openNodes.clear();}
function expandAll(){document.querySelectorAll('.tree-children').forEach(el=>{el.classList.remove('collapsed');openNodes.add(el.id.replace('ch_',''));});document.querySelectorAll('.tree-toggle:not(.leaf)').forEach(el=>el.classList.add('open'));}
function filterTree(){const q=(document.getElementById('treeFilter')?.value||'').toLowerCase();document.querySelectorAll('.tree-row').forEach(row=>{const name=row.dataset.name||'';row.style.display=(q&&!name.includes(q))?'none':'';});}

setTimeout(render,100);
setInterval(render,10000);
</script>
