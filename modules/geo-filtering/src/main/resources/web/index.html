<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Geo-Filtering</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#07080f;--card:#121425;--input:#161830;--border:rgba(255,255,255,.06);--text:#e4e6f0;--dim:#8b8ea8;--muted:#555770;--accent:#22d3a7;--blue:#3b82f6;--red:#f43f5e;--amber:#f59e0b;--green:#22c55e;--r:10px;--font:'Inter',system-ui,sans-serif}
[data-theme="midnight"]{--bg:#0a0a0f;--card:#161620;--input:#1c1c28;--border:rgba(255,255,255,.05);--text:#d8d8e8;--dim:#7878a0;--muted:#505068;--accent:#818cf8}
[data-theme="nord"]{--bg:#2e3440;--card:#434c5e;--input:#4c566a;--border:rgba(216,222,233,.08);--text:#eceff4;--dim:#d8dee9;--muted:#a0aec0;--accent:#88c0d0;--blue:#81a1c1;--red:#bf616a;--amber:#ebcb8b;--green:#a3be8c}
[data-theme="emerald"]{--bg:#041210;--card:#0c2620;--input:#103028;--border:rgba(34,197,94,.08);--text:#d4f0e0;--dim:#6cc898;--muted:#3a7858;--accent:#34d399;--blue:#2dd4bf}
[data-theme="light"]{--bg:#f5f6fa;--card:#ffffff;--input:#f0f1f5;--border:rgba(0,0,0,.08);--text:#1a1a2e;--dim:#555770;--muted:#8b8ea8;--accent:#0d9373;--blue:#2563eb;--red:#dc2626;--amber:#d97706;--green:#16a34a}
[data-theme="rose"]{--bg:#120a0d;--card:#22161c;--input:#2a1c24;--border:rgba(244,63,94,.06);--text:#f0dce4;--dim:#b07888;--muted:#704858;--accent:#fb7185;--blue:#e879f9}
body{font-family:var(--font);background:var(--bg);color:var(--text);padding:20px;font-size:13px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:14px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px}
.stat .l{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--dim)}
.stat .v{font-size:18px;font-weight:700;margin-top:2px}
.v.red{color:var(--red)}.v.green{color:var(--green)}.v.accent{color:var(--accent)}.v.amber{color:var(--amber)}.v.blue{color:var(--blue)}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px}
.card h3{font-size:12px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.tog{display:flex;align-items:center;justify-content:space-between;padding:5px 0;font-size:12px}
.sw{position:relative;width:32px;height:18px;cursor:pointer;display:inline-block}
.sw input{display:none}
.sw .tr{position:absolute;inset:0;background:#1f2242;border-radius:18px;transition:.2s;border:1px solid var(--border)}
.sw .tr::before{content:'';position:absolute;width:12px;height:12px;left:2px;top:2px;background:var(--muted);border-radius:50%;transition:.2s}
.sw input:checked+.tr{background:var(--accent);border-color:var(--accent)}
.sw input:checked+.tr::before{transform:translateX(14px);background:#fff}
.field{margin-bottom:8px}
.field label{display:block;font-size:10px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.field input,.field select{width:100%;padding:6px 10px;background:var(--input);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:var(--font);font-size:12px}
.field input:focus,.field select:focus{outline:none;border-color:var(--accent)}
.row{display:flex;gap:8px;align-items:end}
.btn{padding:6px 14px;border-radius:6px;border:1px solid var(--border);background:var(--input);color:var(--text);cursor:pointer;font-size:11px;font-weight:500;font-family:var(--font);transition:all .12s}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn.p{background:linear-gradient(135deg,var(--accent),var(--blue));color:#fff;border:none}
.btn.d{color:var(--red)}.btn.d:hover{border-color:var(--red)}
.btn.sm{padding:3px 8px;font-size:10px}
.msg{padding:6px 10px;border-radius:6px;font-size:11px;margin-top:6px;display:none}
.msg.ok{display:block;background:rgba(34,197,94,.08);color:var(--green)}
.msg.err{display:block;background:rgba(244,63,94,.08);color:var(--red)}
.cols{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:700px){.cols{grid-template-columns:1fr}}
.tag{display:inline-block;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:600;margin:2px;background:var(--input);border:1px solid var(--border)}
.tag .x{cursor:pointer;margin-left:4px;color:var(--red);font-weight:700}
.tag .x:hover{opacity:.7}
.mode-badge{display:inline-block;padding:3px 10px;border-radius:4px;font-size:11px;font-weight:700;text-transform:uppercase}
.mode-badge.blacklist{background:rgba(244,63,94,.1);color:var(--red);border:1px solid rgba(244,63,94,.2)}
.mode-badge.whitelist{background:rgba(34,197,94,.08);color:var(--green);border:1px solid rgba(34,197,94,.15)}
.bar-chart{margin-top:6px}.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:4px;font-size:11px}
.bar-label{width:30px;text-align:right;font-weight:600;color:var(--dim)}
.bar-fill{height:14px;border-radius:3px;background:linear-gradient(90deg,var(--accent),var(--blue));min-width:2px;transition:width .3s}
.bar-val{color:var(--dim);font-size:10px}
.check-result{padding:12px;background:var(--input);border-radius:6px;margin-top:8px;font-size:12px}
.cr-row{display:flex;justify-content:space-between;padding:3px 0}
.cr-label{color:var(--dim)}
</style></head><body>
<div id="root">Loading...</div>
<script>
// ── Theme sync ──
(function(){
  const p=new URLSearchParams(location.search),t=p.get('theme');
  if(t&&t!=='default')document.documentElement.setAttribute('data-theme',t);
  window.addEventListener('message',function(e){
    if(e.data&&e.data.type==='ip-theme-change'){
      const th=e.data.theme;
      if(!th||th==='default')document.documentElement.removeAttribute('data-theme');
      else document.documentElement.setAttribute('data-theme',th);
    }
  });
})();
const API=location.origin;
async function api(p,o={}){const h={'Content-Type':'application/json'};const r=await fetch(API+'/api/modules/geo-filtering/'+p,{...o,headers:h,credentials:'same-origin'});const d=await r.json().catch(()=>({}));if(!r.ok)throw d;return d}
function esc(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;'):''}
let initialized=false;

async function load(){
  try{
    const st=await api('status');
    if(!initialized){
      const[cfg,cl,stats]=await Promise.all([api('config'),api('countries'),api('stats')]);
      renderFull(st,cfg,cl,stats);
      initialized=true;
    }else{
      updateStats(st);
    }
  }catch(e){
    if(!initialized) document.getElementById('root').innerHTML='<div style="color:var(--red)">'+esc(e.error||e.message||'Error')+'</div>';
  }
}

function renderFull(st,cfg,cl,stats){
const root=document.getElementById('root');
const modeClass=cfg.mode==='whitelist'?'whitelist':'blacklist';
root.innerHTML=`
<div class="grid">
<div class="stat"><div class="l">Mode</div><div class="v"><span class="mode-badge ${modeClass}">${cfg.mode}</span></div></div>
<div class="stat"><div class="l">Checked</div><div class="v accent" id="vChecked">${st.total_checked}</div></div>
<div class="stat"><div class="l">Blocked</div><div class="v red" id="vBlocked">${st.total_blocked}</div></div>
<div class="stat"><div class="l">Allowed</div><div class="v green" id="vAllowed">${st.total_allowed}</div></div>
<div class="stat"><div class="l">Cache Hits</div><div class="v blue" id="vCache">${st.cache_hits}</div></div>
<div class="stat"><div class="l">Countries</div><div class="v" id="vCountries">${st.country_count}</div></div>
<div class="stat"><div class="l">API Calls</div><div class="v" id="vApi">${st.api_calls}</div></div>
<div class="stat"><div class="l">Cache Size</div><div class="v" id="vCacheSize">${st.cache_size}</div></div>
</div>
<div class="cols">
<div>
<div class="card"><h3>Settings</h3>
<div class="tog"><span>Module Enabled</span><label class="sw"><input type="checkbox" id="tEnabled" ${cfg.enabled?'checked':''}><span class="tr"></span></label></div>
<div class="field" style="margin-top:8px"><label>Filter Mode</label>
<select id="cMode"><option value="blacklist" ${cfg.mode==='blacklist'?'selected':''}>Blacklist (block listed countries)</option><option value="whitelist" ${cfg.mode==='whitelist'?'selected':''}>Whitelist (only allow listed countries)</option></select>
</div>
<div class="field"><label>Kick Message</label><input id="cKick" value="${esc(cfg.kick_message)}"></div>
<div class="field"><label>Cache TTL (minutes)</label><input id="cTtl" type="number" value="${cfg.cache_ttl_minutes}"></div>
<button class="btn p" onclick="saveConfig()">Save Configuration</button>
<div id="cfgMsg" class="msg"></div>
</div>
<div class="card"><h3>IP Lookup</h3>
<div class="row"><div class="field" style="margin:0;flex:1"><input id="lookupIp" placeholder="Enter IP to check"></div><button class="btn" onclick="doLookup()">Lookup</button></div>
<div id="lookupResult"></div>
</div>
<div class="card"><h3>Cache</h3>
<div style="display:flex;justify-content:space-between;align-items:center"><span style="color:var(--dim);font-size:12px" id="cacheInfo">${st.cache_size} entries</span><button class="btn sm d" onclick="clearCache()">Clear</button></div>
</div>
</div>
<div>
<div class="card"><h3>Country ${cfg.mode==='whitelist'?'Whitelist':'Blacklist'}</h3>
<div style="margin-bottom:10px;font-size:11px;color:var(--dim)">${cfg.mode==='whitelist'?'Only players from these countries can join':'Players from these countries will be blocked'}</div>
<div class="row" style="margin-bottom:10px"><div class="field" style="margin:0;flex:1"><input id="addCode" placeholder="ISO code (e.g. US, DE, CZ)" maxlength="3" style="text-transform:uppercase"></div><button class="btn" onclick="addCountry()">Add</button></div>
<div id="countryTags">${renderTags(cl.countries||[])}</div>
<div style="margin-top:8px;font-size:10px;color:var(--muted)">Common codes: US, GB, DE, FR, CZ, RU, CN, BR, IN, PL, UA, NL</div>
</div>
<div class="card"><h3>Top Countries (connections)</h3>
<div id="countryChart" class="bar-chart">${renderChart(stats.countries||{})}</div>
</div>
</div>
</div>`;
}

function updateStats(st){
  const ids={vChecked:st.total_checked,vBlocked:st.total_blocked,vAllowed:st.total_allowed,vCache:st.cache_hits,vCountries:st.country_count,vApi:st.api_calls,vCacheSize:st.cache_size};
  for(const[id,val]of Object.entries(ids)){const el=document.getElementById(id);if(el)el.textContent=val;}
}

function renderTags(list){
  if(!list.length) return '<div style="color:var(--muted);font-size:11px">No countries configured</div>';
  return list.map(c=>'<span class="tag">'+esc(c)+'<span class="x" onclick="removeCountry(\''+esc(c)+'\')">&times;</span></span>').join('');
}

function renderChart(data){
  const entries=Object.entries(data);
  if(!entries.length) return '<div style="color:var(--muted);font-size:11px">No data yet</div>';
  const max=Math.max(...entries.map(e=>e[1]),1);
  return entries.map(([code,count])=>{
    const pct=Math.max(2,count/max*100);
    return '<div class="bar-row"><span class="bar-label">'+esc(code)+'</span><div class="bar-fill" style="width:'+pct+'%"></div><span class="bar-val">'+count+'</span></div>';
  }).join('');
}

async function saveConfig(){
  const msg=document.getElementById('cfgMsg');
  try{
    await api('config',{method:'POST',body:JSON.stringify({
      enabled:document.getElementById('tEnabled').checked,
      mode:document.getElementById('cMode').value,
      kick_message:document.getElementById('cKick').value,
      cache_ttl_minutes:+document.getElementById('cTtl').value
    })});
    msg.className='msg ok';msg.textContent='Saved. Reload page to see mode change.';
  }catch(e){msg.className='msg err';msg.textContent=e.error||'Failed'}
}

async function addCountry(){
  const code=document.getElementById('addCode').value.trim().toUpperCase();
  if(!code)return;
  try{await api('countries/add',{method:'POST',body:JSON.stringify({code})});
    const cl=await api('countries');
    document.getElementById('countryTags').innerHTML=renderTags(cl.countries||[]);
    document.getElementById('addCode').value='';
  }catch(e){alert(e.error||'Failed')}
}

async function removeCountry(code){
  try{await api('countries/remove',{method:'POST',body:JSON.stringify({code})});
    const cl=await api('countries');
    document.getElementById('countryTags').innerHTML=renderTags(cl.countries||[]);
  }catch(e){alert(e.error||'Failed')}
}

async function clearCache(){try{await api('cache/clear',{method:'POST'})}catch(e){alert(e.error||'Failed')}}

async function doLookup(){
  const ip=document.getElementById('lookupIp').value.trim(),res=document.getElementById('lookupResult');
  if(!ip)return;
  res.innerHTML='<div style="color:var(--dim);margin-top:8px">Looking up...</div>';
  try{
    const d=await api('lookup',{method:'POST',body:JSON.stringify({ip})});
    const col=d.would_block?'var(--red)':'var(--green)';
    res.innerHTML='<div class="check-result"><div class="cr-row"><span class="cr-label">IP</span><span style="font-family:monospace">'+esc(d.ip)+'</span></div><div class="cr-row"><span class="cr-label">Country</span><span>'+esc(d.country)+' ['+esc(d.country_code)+']</span></div><div class="cr-row"><span class="cr-label">Would Block</span><span style="color:'+col+'">'+(d.would_block?'Yes':'No')+'</span></div><div class="cr-row"><span class="cr-label">Mode</span><span>'+esc(d.mode)+'</span></div></div>';
  }catch(e){res.innerHTML='<div class="msg err">'+esc(e.error||'Failed')+'</div>'}
}

load();setInterval(load,5000);
</script></body></html>
