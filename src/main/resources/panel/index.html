<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>IntegrityPolygon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ═══════════════════════════════════════════════════
       IntegrityPolygon — Admin Panel
       Sharp utilitarian theme, IBM Plex
       ═══════════════════════════════════════════════════ */
    :root {
      --font:       "IBM Plex Sans", system-ui, -apple-system, sans-serif;
      --mono:       "IBM Plex Mono", Consolas, Monaco, monospace;
      --sidebar-w:  256px;
      --sidebar-collapsed-w: 56px;
      --radius:     3px;
      --radius-sm:  2px;
      --radius-md:  3px;
      --radius-lg:  4px;
      --radius-xl:  4px;
      --bg-base:    #090b10;
      --bg-surface: #0e1118;
      --bg-card:    #121722;
      --bg-input:   #0c1018;
      --bg-hover:   #181f2e;
      --bg-active:  #1e2738;
      --border:     rgba(80,110,150,.22);
      --border-hl:  rgba(110,150,200,.38);
      --text:       #d0ecde;
      --text-dim:   #5fa882;
      --text-muted: #30604a;
      --accent:     #34d399;
      --accent-dim: rgba(52,211,153,.1);
      --red:        #ef4444;
      --red-dim:    rgba(239,68,68,.1);
      --amber:      #f59e0b;
      --green:      #34d399;
      --green-dim:  rgba(52,211,153,.12);
      --success:    #34d399;
      --warning:    #f59e0b;
      --error:      #ef4444;
      --blue:       #2dd4bf;
      --blue-dim:   rgba(45,212,191,.1);
      --shadow:     0 2px 8px rgba(0,0,0,.3);
      --shadow-lg:  0 8px 32px rgba(0,0,0,.4);
      --glow:       none;
      --logo-filter: none;
    }

    [data-theme="midnight"] {
      --bg-base:    #0f1016;
      --bg-surface: #14161f;
      --bg-card:    #1a1e2c;
      --bg-input:   #1e2230;
      --bg-hover:   #242a3a;
      --bg-active:  #2c3348;
      --border:     rgba(110,125,160,.2);
      --border-hl:  rgba(140,158,200,.36);
      --text:       #e2e6f5;
      --text-dim:   #96a0bf;
      --text-muted: #6670888;
      --accent:     #7d8bff;
      --accent-dim: rgba(125,139,255,.1);
      --blue:       #58a2ff;
      --blue-dim:   rgba(88,162,255,.1);
      --red:        #ef5b67;
      --red-dim:    rgba(239,91,103,.1);
      --amber:      #f3a83b;
      --green:      #22d3a7;
      --green-dim:  rgba(34,211,167,.12);
      --success:    #22d3a7;
      --warning:    #f3a83b;
      --error:      #ef5b67;
      --shadow:     0 2px 8px rgba(0,0,0,.4);
      --shadow-lg:  0 8px 32px rgba(0,0,0,.5);
      --logo-filter: hue-rotate(8deg) saturate(1.05);
    }

    [data-theme="nord"] {
      --bg-base:    #2e3440;
      --bg-surface: #373e4e;
      --bg-card:    #3f4758;
      --bg-input:   #464f62;
      --bg-hover:   #505a6e;
      --bg-active:  #5a6578;
      --border:     rgba(200,210,228,.14);
      --border-hl:  rgba(210,220,235,.28);
      --text:       #eceff4;
      --text-dim:   #cad0de;
      --text-muted: #9aa5bc;
      --accent:     #88c0d0;
      --accent-dim: rgba(136,192,208,.12);
      --blue:       #81a1c1;
      --blue-dim:   rgba(129,161,193,.12);
      --red:        #bf616a;
      --red-dim:    rgba(191,97,106,.12);
      --amber:      #ebcb8b;
      --green:      #a3be8c;
      --green-dim:  rgba(163,190,140,.14);
      --success:    #a3be8c;
      --warning:    #ebcb8b;
      --error:      #bf616a;
      --shadow:     0 2px 8px rgba(20,24,31,.3);
      --shadow-lg:  0 8px 32px rgba(20,24,31,.4);
      --logo-filter: hue-rotate(172deg) saturate(0.9) brightness(1.02);
    }

    [data-theme="emerald"] {
      --bg-base:    #051612;
      --bg-surface: #091e18;
      --bg-card:    #0f2820;
      --bg-input:   #133228;
      --bg-hover:   #193c30;
      --bg-active:  #204838;
      --border:     rgba(60,120,95,.24);
      --border-hl:  rgba(90,160,128,.36);
      --text:       #d8f0e6;
      --text-dim:   #8ec8b0;
      --text-muted: #5a9878;
      --accent:     #34d399;
      --accent-dim: rgba(52,211,153,.12);
      --blue:       #2dd4bf;
      --blue-dim:   rgba(45,212,191,.12);
      --red:        #f87171;
      --red-dim:    rgba(248,113,113,.12);
      --amber:      #fbbf24;
      --green:      #22c55e;
      --green-dim:  rgba(34,197,94,.12);
      --success:    #22c55e;
      --warning:    #fbbf24;
      --error:      #f87171;
      --shadow:     0 2px 8px rgba(0,0,0,.35);
      --shadow-lg:  0 8px 32px rgba(0,0,0,.45);
      --logo-filter: hue-rotate(18deg) saturate(1.05) brightness(1.02);
    }

    [data-theme="light"] {
      --bg-base:    #eef0f5;
      --bg-surface: #f8f9fc;
      --bg-card:    #ffffff;
      --bg-input:   #eceef4;
      --bg-hover:   #e4e7ef;
      --bg-active:  #d8dceb;
      --border:     rgba(0,0,0,.1);
      --border-hl:  rgba(0,0,0,.18);
      --text:       #141822;
      --text-dim:   #4a5068;
      --text-muted: #8088a0;
      --accent:     #0d9373;
      --accent-dim: rgba(13,147,115,.08);
      --blue:       #2563eb;
      --blue-dim:   rgba(37,99,235,.08);
      --red:        #dc2626;
      --red-dim:    rgba(220,38,38,.06);
      --amber:      #d97706;
      --green:      #16a34a;
      --green-dim:  rgba(22,163,74,.06);
      --success:    #16a34a;
      --warning:    #d97706;
      --error:      #dc2626;
      --shadow:     0 1px 4px rgba(0,0,0,.08);
      --shadow-lg:  0 4px 16px rgba(0,0,0,.1);
      --logo-filter: saturate(.7) brightness(.9);
    }

    [data-theme="rose"] {
      --bg-base:    #120a0d;
      --bg-surface: #180f14;
      --bg-card:    #1e1419;
      --bg-input:   #241820;
      --bg-hover:   #2c1e28;
      --bg-active:  #342430;
      --border:     rgba(200,50,80,.1);
      --border-hl:  rgba(240,80,110,.2);
      --text:       #eedce4;
      --text-dim:   #a87088;
      --text-muted: #684858;
      --accent:     #fb7185;
      --accent-dim: rgba(251,113,133,.1);
      --blue:       #e879f9;
      --blue-dim:   rgba(232,121,249,.1);
      --success:    #22c55e;
      --warning:    #f59e0b;
      --error:      #fb7185;
      --shadow:     0 2px 8px rgba(0,0,0,.4);
      --shadow-lg:  0 8px 32px rgba(0,0,0,.5);
      --logo-filter: hue-rotate(-22deg) saturate(1.1) brightness(1.04);
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: var(--font);
      background: var(--bg-base);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      font-size: 13px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      transition: background .3s, color .3s;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    @keyframes fadeIn  { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:none; } }
    @keyframes slideUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:none; } }
    @keyframes spin    { to   { transform:rotate(360deg); } }

    .fade-in  { animation: fadeIn .25s ease both; }
    .slide-up { animation: slideUp .3s ease both; }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .6s linear infinite;
    }

    .loading-screen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; flex-direction: column; gap: 12px;
      color: var(--text-dim);
    }

    /* ── Auth ── */
    .auth-wrapper { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; background: var(--bg-base); }
    .auth-card { background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 36px 40px; width: 100%; max-width: 400px; text-align: center; animation: slideUp .35s ease; box-shadow: var(--shadow-lg); }
    .auth-card .logo { font-size: 20px; font-weight: 700; letter-spacing: -.3px; background: linear-gradient(135deg, var(--accent), var(--blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 4px; }
    .auth-card .subtitle { color: var(--text-muted); font-size: 11px; margin-bottom: 28px; letter-spacing: .8px; text-transform: uppercase; font-family: var(--mono); }
    .auth-card h2 { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
    .auth-card .desc { color: var(--text-dim); font-size: 12px; margin-bottom: 20px; line-height: 1.6; }

    .field { text-align: left; margin-bottom: 14px; }
    .field label { display: block; font-size: 10px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; font-family: var(--mono); }
    .field input, .field select { width: 100%; padding: 9px 12px; background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-family: var(--font); font-size: 13px; transition: border-color .15s, box-shadow .15s; }
    .field input:focus, .field select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-dim); }
    .field input::placeholder { color: rgba(128,128,128,.45); }
    .field input:-webkit-autofill { -webkit-text-fill-color: var(--text); -webkit-box-shadow: 0 0 0 1000px var(--bg-input) inset; }
    .field .hint { font-size: 11px; color: var(--text-muted); margin-top: 4px; font-family: var(--mono); }

    .btn-primary { display: block; width: 100%; padding: 11px; background: var(--accent); color: #0a1a12; border: none; border-radius: var(--radius); font-family: var(--font); font-size: 13px; font-weight: 700; cursor: pointer; transition: opacity .15s; margin-top: 8px; letter-spacing: .2px; }
    .btn-primary:hover { opacity: .88; }
    .btn-primary:active { opacity: .75; }
    .btn-primary:disabled { opacity: .3; cursor: not-allowed; }

    .alert { margin-top: 14px; padding: 9px 12px; border-radius: var(--radius); font-size: 12px; display: none; text-align: left; font-family: var(--mono); }
    .alert.error { display: block; background: var(--red-dim); color: var(--red); border: 1px solid rgba(239,68,68,.2); }
    .alert.success { display: block; background: var(--green-dim); color: var(--green); border: 1px solid rgba(52,211,153,.2); }

    .msg { padding:5px 10px; border-radius:var(--radius-sm); font-size:11px; display:none; font-family:var(--mono); }
    .msg.ok { display:block; background:var(--green-dim); color:var(--green); }
    .msg.err { display:block; background:var(--red-dim); color:var(--red); }

    /* ── Dashboard Layout ── */
    .dashboard { display: flex; min-height: 100vh; }

    .sidebar { width: var(--sidebar-w); background: var(--bg-surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; z-index: 100; overflow: hidden; }
    .sidebar-header { padding: 14px 12px 10px; border-bottom: 1px solid var(--border); }
    .sidebar-head-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; min-width: 0; }
    .sidebar-toggle { width: 28px; height: 28px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); border-radius: var(--radius-sm); cursor: pointer; display: inline-flex; align-items: center; justify-content: center; flex: 0 0 28px; transition: border-color .12s, color .12s; }
    #logo-cubes { height: 40px; width: auto; flex-shrink: 0; }
    #logo-text  { height: 32px; width: auto; min-width: 0; flex: 1; }
    .sidebar-toggle:hover { border-color: var(--border-hl); color: var(--text-dim); }
    .sidebar-toggle svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 2; }
    .sidebar-header .brand-logo { height: 36px; width: auto; }
    .sidebar-header .version { font-size: 10px; color: var(--text-muted); margin-top: 3px; font-family: var(--mono); }
    .sidebar-nav { flex: 1; padding: 6px 0; overflow-y: auto; }
    .nav-section { padding: 0 10px; margin-top: 14px; }
    .nav-section:first-child { margin-top: 4px; }
    .nav-label { font-size: 9px; text-transform: uppercase; letter-spacing: 1.8px; color: var(--text-muted); padding: 0 8px; margin-bottom: 3px; font-weight: 700; font-family: var(--mono); }
    .nav-item { display: flex; align-items: center; gap: 9px; padding: 7px 10px; border-radius: var(--radius); cursor: pointer; color: var(--text-dim); font-size: 12px; font-weight: 500; transition: all .1s; margin-bottom: 1px; user-select: none; }
    .nav-item:hover { background: var(--bg-hover); color: var(--text); }
    .nav-item.active { background: var(--bg-active); color: var(--accent); border-left: 2px solid var(--accent); padding-left: 8px; }
    .nav-item svg { width: 15px; height: 15px; flex-shrink: 0; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .sidebar-footer { padding: 12px; border-top: 1px solid var(--border); }
    .sidebar-footer .user-info { color: var(--text-dim); font-size: 11px; display: flex; align-items: center; gap: 8px; }
    .sidebar-footer .user-info svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 2; }
    .sidebar-footer .sign-out { color: var(--red); cursor: pointer; margin-top: 6px; font-size: 11px; font-weight: 500; display: flex; align-items: center; gap: 5px; opacity: .75; transition: opacity .12s; }
    .sidebar-footer .sign-out:hover { opacity: 1; }
    .sidebar-footer .sign-out svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2; }

    .main-content { margin-left: var(--sidebar-w); flex: 1; padding: 24px 28px; min-height: 100vh; }

    .dashboard.sidebar-collapsed .sidebar { width: var(--sidebar-collapsed-w); }
    .dashboard.sidebar-collapsed .main-content { margin-left: var(--sidebar-collapsed-w); }
    .dashboard.sidebar-collapsed .sidebar-header .brand-logo,
    .dashboard.sidebar-collapsed .sidebar-header .version,
    .dashboard.sidebar-collapsed .nav-label,
    .dashboard.sidebar-collapsed .nav-item span,
    .dashboard.sidebar-collapsed .account-btn .account-name,
    .dashboard.sidebar-collapsed .account-btn .account-chevron,
    .dashboard.sidebar-collapsed .pop-header,
    .dashboard.sidebar-collapsed .pop-item span,
    .dashboard.sidebar-collapsed .pop-divider { display: none; }
    .dashboard.sidebar-collapsed .sidebar-header { padding: 12px 8px 10px; }
    .dashboard.sidebar-collapsed .sidebar-head-row { justify-content: center; }
    .dashboard.sidebar-collapsed #logo-text  { display: none; }
    .dashboard.sidebar-collapsed #logo-cubes { height: auto; width: 36px; }
    .dashboard.sidebar-collapsed .nav-item { justify-content: center; padding: 8px 0; border-left: none; }
    .dashboard.sidebar-collapsed .nav-item.active { border-left: 2px solid var(--accent); padding-left: calc(50% - 7.5px - 1px); }
    .dashboard.sidebar-collapsed .sidebar-footer { padding: 10px 8px; }
    .dashboard.sidebar-collapsed .account-btn { justify-content: center; padding: 4px; }
    .dashboard.sidebar-collapsed .account-popover { left: calc(100% + 8px); right: auto; width: 200px; bottom: 0; }

    .page-header { margin-bottom: 20px; animation: fadeIn .25s ease; }
    .page-header h2 { font-size: 17px; font-weight: 700; letter-spacing: -.2px; }
    .page-header p { color: var(--text-dim); font-size: 12px; margin-top: 2px; font-family: var(--mono); }

    /* ── Stat Cards ── */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1px; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 16px; background: var(--border); }
    .stat-card { background: var(--bg-card); padding: 16px 18px; }
    .stat-card .stat-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px; color: var(--text-muted); font-family: var(--mono); }
    .stat-card .stat-value { font-size: 24px; font-weight: 700; margin-top: 4px; font-family: var(--mono); letter-spacing: -.5px; }
    .stat-card .stat-value.highlight { color: var(--accent); }

    /* ── Cards ── */
    .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 10px; }
    .card h3 { font-size: 11px; font-weight: 700; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); font-family: var(--mono); }
    .list-row { display: flex; align-items: center; justify-content: space-between; padding: 9px 0; border-bottom: 1px solid var(--border); }
    .list-row:last-child { border-bottom: none; }
    .list-row .row-name { font-weight: 500; font-size: 13px; }
    .list-row .row-meta { color: var(--text-dim); font-size: 12px; font-family: var(--mono); }

    .badge { display: inline-flex; align-items: center; padding: 2px 7px; border-radius: 2px; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; font-family: var(--mono); }
    .badge-green  { background: var(--green-dim); color: var(--green); border: 1px solid rgba(52,211,153,.2); }
    .badge-red    { background: var(--red-dim);   color: var(--red);   border: 1px solid rgba(239,68,68,.2); }
    .badge-blue   { background: var(--blue-dim);  color: var(--blue);  border: 1px solid rgba(45,212,191,.2); }
    .badge-gray   { background: rgba(255,255,255,.03); color: var(--text-muted); border: 1px solid var(--border); }

    .btn { display: inline-flex; align-items: center; gap: 5px; padding: 6px 12px; font-size: 11px; font-weight: 600; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--bg-input); color: var(--text-dim); cursor: pointer; transition: all .1s; font-family: var(--mono); letter-spacing: .3px; text-transform: uppercase; }
    .btn:hover { border-color: var(--border-hl); color: var(--text); background: var(--bg-hover); }
    .btn:disabled { opacity: .35; cursor: not-allowed; }
    .btn-danger { color: var(--red); }
    .btn-danger:hover { border-color: var(--red); color: var(--red); background: var(--red-dim); }
    .btn-success { color: var(--green); }
    .btn-success:hover { border-color: var(--green); background: var(--green-dim); }
    .btn svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2; }

    .toggle { position: relative; width: 36px; height: 20px; cursor: pointer; display: inline-block; }
    .toggle input { display: none; }
    .toggle .track { position: absolute; inset: 0; background: var(--bg-active); border-radius: 2px; transition: background .15s; border: 1px solid var(--border); }
    .toggle .track::before { content: ''; position: absolute; width: 14px; height: 14px; left: 2px; top: 2px; background: var(--text-muted); border-radius: 1px; transition: transform .15s, background .15s; }
    .toggle input:checked + .track { background: var(--accent-dim); border-color: var(--accent); }
    .toggle input:checked + .track::before { transform: translateX(16px); background: var(--accent); }

    @keyframes ov-shimmer { 0% { background-position: -600px 0; } 100% { background-position: 600px 0; } }
    @keyframes ov-reveal  { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: none; } }
    .sk { border-radius: 2px; background: linear-gradient(90deg, var(--bg-active) 0%, var(--bg-hover) 40%, var(--bg-active) 80%); background-size: 600px 100%; animation: ov-shimmer 1.4s ease infinite; }
    .ov-loaded { animation: ov-reveal .32s ease both; }
    .ov-loaded > *:nth-child(1) { animation: ov-reveal .28s .00s ease both; }
    .ov-loaded > *:nth-child(2) { animation: ov-reveal .28s .05s ease both; }
    .ov-loaded > *:nth-child(3) { animation: ov-reveal .28s .10s ease both; }
    .ov-loaded > *:nth-child(4) { animation: ov-reveal .28s .15s ease both; }

    /* ── Chart cards — redesigned sparkline style ── */
    .chart-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0;
      position: relative;
      overflow: hidden;
    }
    .chart-card .chart-header {
      display: flex; justify-content: space-between; align-items: flex-start;
      padding: 13px 14px 0;
    }
    .chart-card .chart-title {
      font-size: 9px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1.3px; color: var(--text-muted); font-family: var(--mono);
    }
    /* min/avg/max strip */
    .chart-minmax {
      display: flex; gap: 10px; align-items: baseline;
    }
    .chart-minmax span {
      font-size: 9px; font-family: var(--mono); color: var(--text-muted);
    }
    .chart-minmax .mm-val { color: var(--text-dim); font-weight: 600; }
    /* Large current-value label */
    .chart-card .chart-current {
      font-size: 22px; font-weight: 700; font-family: var(--mono);
      letter-spacing: -.6px; line-height: 1.2;
      padding: 2px 14px 8px;
    }
    .chart-card .chart-current .chart-unit {
      font-size: 11px; color: var(--text-muted); font-weight: 400; margin-left: 2px; letter-spacing: 0;
    }
    /* Canvas wrapper — fixed height so skeleton and live canvas match */

      height: 80px;

      height: 80px;
      display: block;

    .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }

    /* ── Overview stats strip ── */
    .overview-stats { display: grid; grid-template-columns: repeat(4, 1fr); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 10px; background: var(--border); gap: 1px; }
    .ov-stat { background: var(--bg-card); padding: 14px 16px; display: flex; flex-direction: column; gap: 3px; }
    .ov-stat .ov-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px; color: var(--text-muted); font-family: var(--mono); }

    .ov-stat .ov-sub { font-size: 10px; color: var(--text-dim); font-family: var(--mono); margin-top: 1px; }

    /* ── Overview server rows ── */
    .server-row { display: grid; grid-template-columns: 1fr auto; align-items: start; padding: 12px 0; border-bottom: 1px solid var(--border); gap: 12px; }
    .server-row:last-child { border-bottom: none; }
    .server-row .srv-name { font-weight: 600; font-size: 13px; display: flex; align-items: center; gap: 7px; margin-bottom: 2px; }
    .server-row .srv-addr { font-family: var(--mono); font-size: 10px; color: var(--text-muted); margin-bottom: 5px; }
    .server-row .srv-stats { display: flex; gap: 14px; flex-wrap: wrap; }
    .server-row .srv-stat { font-family: var(--mono); font-size: 10px; color: var(--text-dim); }
    .server-row .srv-stat b { color: var(--text); font-weight: 600; }
    .server-row .srv-badges { display: flex; gap: 5px; align-items: center; flex-shrink: 0; padding-top: 2px; }

    .mem-bar-wrap { margin-top: 8px; }
    .mem-bar-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3px; }
    .mem-bar-label { font-family: var(--mono); font-size: 9px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .8px; }
    .mem-bar-val   { font-family: var(--mono); font-size: 9px; color: var(--text-dim); }
    .mem-bar-track { height: 2px; background: var(--bg-active); border-radius: 1px; overflow: hidden; }
    .mem-bar-fill  { height: 100%; border-radius: 1px; transition: width .4s ease; }

    /* ── Logs ── */
    .log-container { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; max-height: 520px; overflow-y: auto; font-family: var(--mono); font-size: 11px; line-height: 1.7; }
    .log-entry { padding: 1px 0; }
    .log-entry .log-time { color: var(--text-muted); }
    .log-entry .log-source { color: var(--blue); }
    .log-entry.warn .log-level  { color: var(--amber); }
    .log-entry.error .log-level { color: var(--red); }
    .log-entry.info .log-level  { color: var(--green); }

    .log-toolbar select { padding: 5px 8px; background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-family: var(--mono); font-size: 11px; }
    .log-toolbar select:focus, .log-toolbar input:focus { outline: none; border-color: var(--accent); }

    .marketplace-grid-wrap { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }

    .market-card:nth-child(4) { animation-delay: .15s; }

    .mc-icon.ic-geo        { background: linear-gradient(135deg, #06b6d4, #3b82f6); }
    .mc-icon.ic-identity   { background: linear-gradient(135deg, #22c55e, #14b8a6); }
    .mc-icon.ic-spike      { background: linear-gradient(135deg, #f97316, #ef4444); }

    .pop-item { display: flex; align-items: center; gap: 8px; padding: 7px 10px; border-radius: var(--radius-sm); cursor: pointer; font-size: 11px; font-weight: 500; color: var(--text-dim); transition: all .1s; font-family: var(--mono); }
    .pop-item:hover { background: var(--bg-hover); color: var(--text); }
    .pop-item.danger { color: var(--red); }
    .pop-item.danger:hover { background: var(--red-dim); }
    .pop-item svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 2; flex-shrink: 0; }
    .pop-divider { height: 1px; background: var(--border); margin: 3px 0; }

    /* ── Modal ── */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.65); display: flex; align-items: center; justify-content: center; z-index: 500; animation: fadeIn .12s ease; }
    .modal { background: var(--bg-card); border: 1px solid var(--border-hl); border-radius: var(--radius); padding: 24px; width: 100%; max-width: 440px; max-height: min(86vh, 760px); overflow: auto; box-shadow: var(--shadow-lg); animation: slideUp .18s ease; }
    .modal .field input { max-width: 100%; }
    .modal h3 { font-size: 14px; font-weight: 700; margin-bottom: 3px; letter-spacing: -.1px; }
    .modal .modal-desc { color: var(--text-dim); font-size: 11px; margin-bottom: 16px; font-family: var(--mono); }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 14px; }
    .modal-actions .btn-cancel { padding: 7px 14px; border-radius: var(--radius); background: var(--bg-input); border: 1px solid var(--border); color: var(--text-dim); cursor: pointer; font-size: 11px; font-family: var(--mono); font-weight: 600; transition: all .1s; text-transform: uppercase; letter-spacing: .5px; }
    .modal-actions .btn-cancel:hover { border-color: var(--border-hl); color: var(--text); }

    .theme-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 6px; margin-top: 6px; }
    .theme-swatch { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: var(--radius); border: 1px solid var(--border); cursor: pointer; background: var(--bg-input); transition: all .12s; }
    .theme-swatch:hover { border-color: var(--border-hl); }
    .theme-swatch.active { border-color: var(--accent); background: var(--accent-dim); }
    .theme-swatch .swatch-dots { display: flex; gap: 3px; flex-shrink: 0; }
    .theme-swatch .dot { width: 10px; height: 10px; border-radius: 1px; border: 1px solid rgba(128,128,128,.15); }
    .theme-swatch .swatch-name { font-size: 10px; font-weight: 700; font-family: var(--mono); text-transform: uppercase; letter-spacing: .5px; }

    @media (max-width: 768px) {
      .sidebar { width: 52px; }
      .sidebar-header .brand, .nav-label, .nav-item span, .sidebar-footer .user-info span, .sidebar-footer .sign-out span { display: none; }
      .nav-item { justify-content: center; padding: 10px; }
      .main-content { margin-left: 52px; padding: 14px; }
      .charts-grid { grid-template-columns: 1fr; }
      .modal { padding: 16px; max-width: min(94vw, 520px); }
      .theme-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

  async function api(path, opts = {}) {
    const headers = { 'Content-Type': 'application/json', ...(opts.headers || {}) };
    try {
      const res = await fetch(API + path, { ...opts, headers, credentials: 'same-origin' });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        const err = { status: res.status, ...data };
        if (res.status === 403) showPermissionDenied(err.error || 'You do not have permission to access this action.');
        throw err;
      }
      return data;
    } catch (err) {
      if (err.status) throw err;
      throw { status: 0, error: 'Network error — cannot reach server' };
    }
  }

  function showPermissionDenied(message) {
    const page = document.querySelector('#pageContent');
    if (!page) return;
    page.innerHTML = `<div class="card" style="border-color:var(--amber)"><h3>Permission Denied</h3><div style="font-size:12px;color:var(--text-dim);font-family:var(--mono)">${esc(message || 'Your account role does not allow this operation.')}</div></div>`;
  }

        throw e;
      }
      currentUser = await api('/api/auth/me').catch(() => null);
      if (!currentUser) { renderLogin(); return; }
      if (st.must_change_password) renderChangePw();
      else if (!st.setup_completed) renderSetup();
      else renderDash();

      app.innerHTML = `<div class="loading-screen"><div style="text-align:center"><div style="font-size:18px;font-weight:700;margin-bottom:8px;color:var(--text);font-family:var(--mono)">IntegrityPolygon</div><div style="color:var(--red);margin-bottom:12px;font-family:var(--mono);font-size:12px">${esc(e.error || 'Cannot connect to server')}</div><button class="btn-primary" style="width:auto;padding:9px 20px;display:inline-block" onclick="location.reload()">Retry</button></div></div>`;

  }

  function bindNavItems() {
    document.querySelectorAll('.nav-item').forEach(item => {
      item.onclick = () => {
        const p = item.dataset.p;
        setActiveNavItem(p);
        p.startsWith('mod:') ? loadModDash(p.slice(4)) : navTo(p);
      };
    });
  }

  function setActiveNavItem(page) {
    document.querySelectorAll('.nav-item').forEach(x => x.classList.toggle('active', x.dataset.p === page));
  }

  function rebuildDashboardNav() {
    const nav = $('#modNav'); if (!nav) return;
    nav.querySelectorAll('.nav-item[data-p^="mod:"]').forEach(node => node.remove());
    nav.style.display = modDash.length ? '' : 'none';
    modDash.forEach(m => {
      const el = document.createElement('div');
      el.className = 'nav-item'; el.dataset.p = 'mod:' + m.id;
      const mi = MOD_ICONS[m.id];
      el.innerHTML = (mi ? IC[mi.icon] : IC.modDefault) + '<span>' + esc(m.name) + '</span>';
      nav.appendChild(el);
    });
  }

  async function refreshDashboardsSidebar(activePage) {
    try { const d = await api('/api/dashboards'); modDash = d.dashboards || []; } catch { modDash = []; }
    if (activePage && activePage.startsWith('mod:')) {
      const openId = activePage.slice(4);
      if (!modDash.some(m => m.id === openId)) {
        activePage = 'modules'; curPage = 'modules';
        const page = $('#pageContent'); if (page) pgModules(page);
      }
    }
    rebuildDashboardNav(); bindNavItems();
    if (activePage) setActiveNavItem(activePage);
  }

  function sleep(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }
  function dashboardIdSet(list) { const ids = new Set(); (list || []).forEach(m => { if (m && m.id) ids.add(String(m.id)); }); return ids; }
  function setsEqual(a, b) { if (a.size !== b.size) return false; for (const v of a) if (!b.has(v)) return false; return true; }

  async function refreshAfterRepositoryChange(prevDashSet, tries = 8, delayMs = 450) {
    const page = $('#pageContent');
    if (page && curPage === 'marketplace') await pgMarketplace(page);
    for (let i = 0; i < tries; i++) {
      await refreshDashboardsSidebar(curPage);
      const nowSet = dashboardIdSet(modDash);
      if (!prevDashSet || !prevDashSet.size || !setsEqual(prevDashSet, nowSet)) return;
      if (i < tries - 1) { await sleep(delayMs); if (page && curPage === 'marketplace') await pgMarketplace(page); }
    }
  }

  function navTo(page) {
    curPage = page;
    setActiveNavItem(page);
    if (window._pageInterval) { clearInterval(window._pageInterval); window._pageInterval = null; }
    const el = $('#pageContent');
    const pages = { overview: pgOverview, modules: pgModules, extenders: pgExtenders, marketplace: pgMarketplace, users: pgUsers, settings: pgSettings };
    if (pages[page]) pages[page](el);
  }

  // ═══════════════════════════════════════════════════
  //  Chart helpers — bezier sparkline (matches profiler)
  // ═══════════════════════════════════════════════════

  function resolveCssColor(token, fallback) {
    const css = getComputedStyle(document.documentElement);
    const val = css.getPropertyValue(token).trim();
    return val || fallback;
  }

  function hexAlpha(hex, alpha) {
    if (!hex || hex[0] !== '#') return hex;
    const h = hex.replace('#','');
    const r = parseInt(h.length===3?h[0]+h[0]:h.slice(0,2),16);
    const g = parseInt(h.length===3?h[1]+h[1]:h.slice(2,4),16);
    const b = parseInt(h.length===3?h[2]+h[2]:h.slice(4,6),16);
    return `rgba(${r},${g},${b},${alpha})`;
  }

  // Update value label, min/avg/max stats, then redraw the sparkline
  function updateChartDisplay(canvasId, valId, mmPrefix, data, colorToken, unit, smooth, maxLine) {
    const cur = data.length ? data[data.length - 1] : 0;

    // Current value label
    const valEl = document.getElementById(valId);
    if (valEl) {
      valEl.innerHTML = (Number.isInteger(cur) ? cur : cur.toFixed(0)) +
              (unit ? `<span class="chart-unit">${unit}</span>` : '');
    }

    // min / avg / max labels
    if (data.length && mmPrefix) {
      const mn = Math.min(...data), mx = Math.max(...data);
      const avg = data.reduce((a,b) => a+b, 0) / data.length;
      const fmt = v => Number.isInteger(cur) ? Math.round(v) : v.toFixed(0);
      const minEl = document.getElementById(mmPrefix + '-min');
      const avgEl = document.getElementById(mmPrefix + '-avg');
      const maxEl = document.getElementById(mmPrefix + '-max');
      if (minEl) minEl.textContent = fmt(mn) + (unit ? unit.trim() : '');
      if (avgEl) avgEl.textContent = fmt(avg) + (unit ? unit.trim() : '');
      if (maxEl) maxEl.textContent = fmt(mx) + (unit ? unit.trim() : '');
    }

    drawSparkline(canvasId, data, { colorToken, maxLine, smooth });
  }

  // Legacy alias for WS handler and refreshActiveCharts
  function drawChart(id, data, colorToken, maxLine, doSmooth) {
    drawSparkline(id, data, { colorToken, maxLine, smooth: doSmooth });
  }

  function drawSparkline(id, data, opts = {}) {
    const canvas = document.getElementById(id); if (!canvas) return;

    let w = canvas.offsetWidth || canvas.parentElement?.offsetWidth || canvas.parentElement?.clientWidth || 400;
    if (w < 10) w = 400;
    const h = 80;
    const dpr = window.devicePixelRatio || 1;

    canvas.width  = Math.round(w * dpr);
    canvas.height = Math.round(h * dpr);
    canvas.style.width  = w + 'px';
    canvas.style.height = h + 'px';

    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    ctx.clearRect(0, 0, w, h);

    const css = getComputedStyle(document.documentElement);

    // Empty-state: dashed midline
    if (!data || data.length < 2) {
      const borderClr = css.getPropertyValue('--border').trim() || 'rgba(80,110,150,.22)';
      ctx.strokeStyle = borderClr; ctx.lineWidth = 1; ctx.globalAlpha = 0.4; ctx.setLineDash([3,5]);
      ctx.beginPath(); ctx.moveTo(0, h/2); ctx.lineTo(w, h/2); ctx.stroke();
      ctx.setLineDash([]); ctx.globalAlpha = 1;
      return;
    }

    // Resolve colors
    const lineColor  = resolveCssColor(opts.colorToken || '--accent', '#34d399');
    const mutedClr   = css.getPropertyValue('--text-muted').trim() || '#30604a';
    const borderClr  = css.getPropertyValue('--border').trim()     || 'rgba(80,110,150,.22)';
    const redClr     = css.getPropertyValue('--red').trim()        || '#ef4444';
    const amberClr   = css.getPropertyValue('--amber').trim()      || '#f59e0b';

    // Optionally smooth
    let pts = data;
    if (opts.smooth) {
      pts = [data[0]];
      for (let i = 1; i < data.length; i++) pts.push(pts[i-1] * 0.4 + data[i] * 0.6);
    }

    let maxV = Math.max(...pts, 1);
    if (opts.maxLine) maxV = Math.max(maxV, opts.maxLine);
    const ceiling = maxV * 1.08;

    // Layout — left pad for y-labels
    const padL = 26, padR = 8, padT = 8, padB = 4;
    const gw = w - padL - padR, gh = h - padT - padB;

    const px = i => padL + (i / (pts.length - 1)) * gw;
    const py = v => padT + gh * (1 - Math.min(v, ceiling) / ceiling);

    // Y-axis labels
    const yLabels = opts.yLabels || [];
    if (yLabels.length) {
      ctx.font = '8px "IBM Plex Mono", monospace';
      ctx.fillStyle = mutedClr; ctx.globalAlpha = 0.8;
      ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
      yLabels.forEach(lv => {
        const ly = py(lv);
        if (ly >= padT - 2 && ly <= h - padB + 2) ctx.fillText(String(lv), padL - 4, ly);
      });
      ctx.globalAlpha = 1; ctx.textAlign = 'left';
    }

    // Grid lines at 25/50/75%
    ctx.strokeStyle = borderClr; ctx.lineWidth = 1; ctx.globalAlpha = 0.5; ctx.setLineDash([2,4]);
    [0.25, 0.5, 0.75].forEach(t => {
      const ly = padT + gh * t;
      ctx.beginPath(); ctx.moveTo(padL, ly); ctx.lineTo(padL + gw, ly); ctx.stroke();
    });
    ctx.setLineDash([]); ctx.globalAlpha = 1;

    // Max line (e.g. heap max)
    if (opts.maxLine) {
      const my = py(opts.maxLine);
      ctx.strokeStyle = hexAlpha(redClr, 0.35); ctx.lineWidth = 1; ctx.setLineDash([4,4]);
      ctx.beginPath(); ctx.moveTo(padL, my); ctx.lineTo(padL + gw, my); ctx.stroke();
      ctx.setLineDash([]);
    }

    // Bezier path builder
    function buildPath() {
      ctx.beginPath(); ctx.moveTo(px(0), py(pts[0]));
      for (let i = 1; i < pts.length; i++) {
        const x0 = px(i-1), y0 = py(pts[i-1]), x1 = px(i), y1 = py(pts[i]);
        const cpx = (x0 + x1) / 2;
        ctx.bezierCurveTo(cpx, y0, cpx, y1, x1, y1);
      }
    }

    // Gradient fill
    buildPath();
    ctx.lineTo(px(pts.length-1), h - padB); ctx.lineTo(px(0), h - padB); ctx.closePath();
    const grad = ctx.createLinearGradient(0, padT, 0, h);
    grad.addColorStop(0,    hexAlpha(lineColor, 0.22));
    grad.addColorStop(0.55, hexAlpha(lineColor, 0.06));
    grad.addColorStop(1,    hexAlpha(lineColor, 0.0));
    ctx.fillStyle = grad; ctx.fill();

    // Line stroke
    buildPath();
    ctx.strokeStyle = lineColor; ctx.lineWidth = 1.5; ctx.lineJoin = 'round'; ctx.lineCap = 'round'; ctx.stroke();

    // Endpoint dot
    const ex = px(pts.length - 1), ey = py(pts[pts.length - 1]);
    ctx.beginPath(); ctx.arc(ex, ey, 5, 0, Math.PI*2);
    ctx.fillStyle = hexAlpha(lineColor, 0.18); ctx.fill();
    ctx.beginPath(); ctx.arc(ex, ey, 2.5, 0, Math.PI*2);
    ctx.fillStyle = lineColor; ctx.fill();
  }

      if (!_extendersInitialized) {
        try {

          $('#extenderSecret').innerHTML = `<h3>Extender Connection Info</h3>
          <p style="color:var(--text-dim);font-size:11px;margin-bottom:8px;font-family:var(--mono)">Copy these values to each Paper server's <code>plugins/IntegrityPolygon-Extender/config.yml</code></p>

    }
    if (!servers.length) {
      html += '<div class="' + cardCls + '"><div style="color:var(--text-muted);font-family:var(--mono);font-size:11px">No backend servers registered in Velocity.</div></div>';
      $('#extenderList').innerHTML = html; return;
    }
    servers.forEach(v => {

      const badge = enrolled ? '<span class="badge badge-green">Enrolled</span>' : '<span class="badge badge-gray">Not Enrolled</span>';
      html += '<div class="' + cardCls + '" style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px"><div><div style="font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px">' + esc(v.name) + ' ' + badge + '</div><div style="color:var(--text-dim);font-size:11px;margin-top:2px;font-family:var(--mono)">' + esc(v.address) + '</div></div><span class="badge badge-blue">' + v.players + ' player' + (v.players !== 1 ? 's' : '') + '</span></div>';
      if (enrolled) {
        const tpsVal = typeof v.tps === 'number' ? v.tps.toFixed(1) : '?';
        const tpsColor = v.tps >= 19 ? 'var(--green)' : v.tps >= 15 ? 'var(--amber)' : 'var(--red)';

        html += '<div class="stats-grid" style="margin-bottom:0">';

        html += '<div class="stat-card"><div class="stat-label">Memory</div><div class="stat-value" style="font-size:14px">' + v.memory_used_mb + '<span style="font-size:12px;color:var(--text-dim)">/' + v.memory_max_mb + ' MB (' + memPct + '%)</span></div></div>';
        html += '<div class="stat-card"><div class="stat-label">Players</div><div class="stat-value highlight">' + v.players + '<span style="font-size:12px;color:var(--text-dim)">/' + (v.max_players || '?') + '</span></div></div>';
        html += '<div class="stat-card"><div class="stat-label">CPU</div><div class="stat-value">' + (v.cpu_usage >= 0 ? v.cpu_usage.toFixed(1) + '%' : 'N/A') + '</div></div>';
        html += '<div class="stat-card"><div class="stat-label">MC Version</div><div class="stat-value" style="font-size:14px">' + esc(v.mc_version || '?') + '</div></div>';
        html += '<div class="stat-card"><div class="stat-label">Heartbeat</div><div class="stat-value" style="font-size:14px">' + ago + 's ago</div></div>';

      html += '</div>';
    });

      el.innerHTML = users.map(u => `<div class="list-row" style="flex-wrap:wrap;gap:8px">
        <div style="display:flex;align-items:center;gap:10px;flex:1;min-width:200px">
          <div style="width:28px;height:28px;border-radius:var(--radius);background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#0a1a12;flex-shrink:0;font-family:var(--mono)">${esc(u.username.charAt(0).toUpperCase())}</div>
          <div><div class="row-name">${esc(u.username)}</div><div class="row-meta">${esc(u.created || 'N/A')}</div></div>
        </div>
        <div style="display:flex;gap:6px;align-items:center">
          ${roleBadge(u.role || 'admin')}
          <select onchange="updateUserRole('${esc(u.username)}',this.value)" style="padding:4px 7px;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:10px;font-family:var(--mono)">
            <option value="moderator" ${u.role==='moderator'?'selected':''}>Moderator</option>
            <option value="admin" ${(u.role==='admin'||!u.role)?'selected':''}>Admin</option>
          </select>
          <button class="btn" onclick="resetUserPw('${esc(u.username)}')">Reset PW</button>
          <button class="btn btn-danger" onclick="deleteUser('${esc(u.username)}')">Remove</button>
        </div>
      </div>`).join('');
    } catch { const el = $('#userList'); if (el) el.innerHTML = '<div style="color:var(--red);font-family:var(--mono);font-size:11px">Failed</div>'; }
  }
  async function updateUserRole(username, role) {
    try { await api('/api/users/' + encodeURIComponent(username), { method: 'PUT', body: JSON.stringify({ role }) }); loadUserList(); }
    catch (e) { alert(e.error || 'Failed'); loadUserList(); }
  }
  async function resetUserPw(username) {
    const pw = prompt('New password for ' + username + ' (min 8 characters):');
    if (!pw || pw.length < 8) { if (pw !== null) alert('Password must be at least 8 characters'); return; }
    try { await api('/api/users/' + encodeURIComponent(username), { method: 'PUT', body: JSON.stringify({ password: pw }) }); alert('Password reset for ' + username); }
    catch (e) { alert(e.error || 'Failed'); }
  }
  async function deleteUser(u) {
    if (!confirm('Remove user "' + u + '"?')) return;
    try { await api('/api/users/' + u, { method: 'DELETE' }); loadUserList(); }
    catch (e) { alert(e.error || 'Failed'); }
  }

  // ── Settings ──
  async function pgSettings(el) {
    const curTheme = localStorage.getItem('ip_theme') || 'default';
    let webPort = '...', extPort = '...';
    try { const cfg = await api('/api/config'); webPort = cfg?.web?.port || 3490; extPort = cfg?.extender?.port || (webPort + 1); } catch {}
    el.innerHTML = `<div class="page-header fade-in"><h2>Settings</h2><p>Server information and configuration</p></div>
    <div id="portBanner" class="alert" style="display:none;margin-bottom:12px;background:rgba(245,158,11,.08);color:var(--amber);border:1px solid rgba(245,158,11,.2);padding:9px 14px;border-radius:var(--radius);font-size:11px;font-weight:600;font-family:var(--mono)"></div>
    <div class="card"><h3>Color Theme</h3>
      <div class="theme-grid" id="themeGrid">
        ${THEMES.map(t => `<div class="theme-swatch ${t.id===curTheme?'active':''}" data-theme-id="${t.id}" onclick="selectTheme('${t.id}')">
          <div class="swatch-dots">${t.colors.map(c => '<div class="dot" style="background:'+c+'"></div>').join('')}</div>
          <div class="swatch-name">${t.name}</div>
        </div>`).join('')}
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div class="card"><h3>Web Panel Port</h3><p style="font-size:10px;color:var(--text-muted);margin-bottom:10px;font-family:var(--mono)">Port the web dashboard listens on. Requires restart.</p>
        <div style="display:flex;gap:8px;align-items:flex-end"><div class="field" style="flex:1;margin:0"><label>Port</label><input type="number" id="cfgWebPort" value="${webPort}" min="1024" max="65535"></div><button class="btn" onclick="savePorts()" style="padding:8px 12px;margin-bottom:1px">Save</button></div>
      </div>
      <div class="card"><h3>TCP Socket Port</h3><p style="font-size:10px;color:var(--text-muted);margin-bottom:10px;font-family:var(--mono)">Port for extender TCP connections from Paper servers. Requires restart.</p>
        <div style="display:flex;gap:8px;align-items:flex-end"><div class="field" style="flex:1;margin:0"><label>Port</label><input type="number" id="cfgExtPort" value="${extPort}" min="1024" max="65535"></div><button class="btn" onclick="savePorts()" style="padding:8px 12px;margin-bottom:1px">Save</button></div>
      </div>
    </div>
    <div id="portMsg" class="msg" style="margin-bottom:12px"></div>
    <div class="card"><h3>Server Info</h3><div id="serverInfo"><div class="spinner"></div></div></div>`;
    try {
      const s = await api('/api/status');
      $('#serverInfo').innerHTML = `<div class="list-row"><div class="row-name">Java Version</div><div class="row-meta">${esc(s.java_version)}</div></div><div class="list-row"><div class="row-name">Operating System</div><div class="row-meta">${esc(s.os)}</div></div><div class="list-row"><div class="row-name">Uptime</div><div class="row-meta">${esc(s.uptime_formatted)}</div></div><div class="list-row"><div class="row-name">Players Online</div><div class="row-meta">${s.total_players}</div></div>`;
    } catch { $('#serverInfo').innerHTML = '<div style="color:var(--text-muted);font-family:var(--mono);font-size:11px">Failed to load</div>'; }
  }
  async function savePorts() {
    const webPort = parseInt($('#cfgWebPort')?.value);
    const extPort = parseInt($('#cfgExtPort')?.value);
    const msg = $('#portMsg'); if (!msg) return;
    msg.className = 'msg'; msg.style.display = 'none';
    if (isNaN(webPort) || isNaN(extPort) || webPort < 1024 || webPort > 65535 || extPort < 1024 || extPort > 65535) { msg.className = 'msg err'; msg.style.display = 'block'; msg.textContent = 'Ports must be between 1024 and 65535'; return; }
    if (webPort === extPort) { msg.className = 'msg err'; msg.style.display = 'block'; msg.textContent = 'Web port and extender port cannot be the same'; return; }
    try {
      const r = await api('/api/config/ports', { method: 'PATCH', body: JSON.stringify({ web_port: webPort, extender_port: extPort }) });
      msg.className = 'msg ok'; msg.style.display = 'block'; msg.textContent = 'Saved';
      if (r.restart_required) { const banner = $('#portBanner'); if (banner) { banner.style.display = 'block'; banner.textContent = '⚠ Port settings changed. Restart the server for changes to take effect.'; } }
    } catch (e) { msg.className = 'msg err'; msg.style.display = 'block'; msg.textContent = e.error || 'Failed to save'; }
  }

  function selectTheme(id) {
    applyTheme(id);
    document.querySelectorAll('.theme-swatch').forEach(s => s.classList.toggle('active', s.dataset.themeId === id));
  }

  // ── Account Settings & Policy Modals ──
  function openAccountSettings() {
    const area = $('#accountArea'); if (area) area.classList.remove('open');
    const curTheme = localStorage.getItem('ip_theme') || 'default';
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `<div class="modal" style="max-width:500px">
      <h3>Account Settings</h3><p class="modal-desc">Manage appearance and security.</p>
      <div class="card" style="padding:12px 14px;margin-bottom:10px"><h3>Appearance</h3>
        <div class="theme-grid" id="modalThemeGrid">
          ${THEMES.map(t => `<div class="theme-swatch ${t.id===curTheme?'active':''}" data-theme-id="${t.id}"><div class="swatch-dots">${t.colors.map(c=>'<div class="dot" style="background:'+c+'"></div>').join('')}</div><div class="swatch-name">${t.name}</div></div>`).join('')}
        </div>
      </div>
      <form id="modalPwForm" class="card" style="padding:12px 14px">
        <h3>Account Name</h3>
        <div class="field"><label>Username</label><input type="text" id="mUser" required minlength="3" value="${esc(currentUser?.username || '')}"></div>
        <div id="modalUserMsg" class="alert"></div>
        <div style="display:flex;justify-content:flex-end;margin-bottom:10px"><button type="button" class="btn-primary" id="saveUserBtn" style="width:auto;padding:8px 18px;margin:0">Update Username</button></div>
        <h3>Change Password</h3>
        <div class="field"><label>Current Password</label><input type="password" id="mCur" required></div>
        <div class="field"><label>New Password</label><input type="password" id="mNew" required minlength="8"></div>
        <div class="field"><label>Confirm New Password</label><input type="password" id="mConf" required minlength="8"></div>
        <div id="modalPwMsg" class="alert"></div>
        <div class="modal-actions">
          <button type="button" class="btn-cancel" id="modalCancel">Close</button>
          <button type="submit" class="btn-primary" style="width:auto;padding:8px 18px;margin:0">Save</button>
        </div>
      </form>
    </div>`;
    document.body.appendChild(overlay);
    overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
    overlay.querySelector('#modalCancel').onclick = () => overlay.remove();
    overlay.querySelector('#saveUserBtn').onclick = async () => {
      const msg = overlay.querySelector('#modalUserMsg'), btn = overlay.querySelector('#saveUserBtn');
      msg.className = 'alert'; msg.style.display = 'none';
      const username = overlay.querySelector('#mUser').value.trim();
      if (username.length < 3) { msg.className = 'alert error'; msg.textContent = 'Username must be at least 3 characters'; msg.style.display = 'block'; return; }
      btn.disabled = true; btn.textContent = 'Saving…';
      try {
        const d = await api('/api/auth/account', { method: 'PATCH', body: JSON.stringify({ username }) });
        currentUser = { ...(currentUser || {}), username: d.username || username, role: d.role || currentUser?.role || 'admin' };
        msg.className = 'alert success'; msg.textContent = 'Username updated'; msg.style.display = 'block'; renderDash();
      } catch (err) { msg.className = 'alert error'; msg.textContent = err.error || 'Failed'; msg.style.display = 'block'; }
      finally { btn.disabled = false; btn.textContent = 'Update Username'; }
    };
    overlay.querySelectorAll('.theme-swatch').forEach(s => {
      s.onclick = () => {
        const id = s.dataset.themeId; applyTheme(id);
        overlay.querySelectorAll('.theme-swatch').forEach(x => x.classList.toggle('active', x.dataset.themeId === id));
        const pg = document.querySelector('#themeGrid'); if (pg) pg.querySelectorAll('.theme-swatch').forEach(x => x.classList.toggle('active', x.dataset.themeId === id));
      };
    });
    overlay.querySelector('#modalPwForm').onsubmit = async e => {
      e.preventDefault();
      const msg = overlay.querySelector('#modalPwMsg'), btn = overlay.querySelector('.btn-primary');
      msg.className = 'alert'; msg.style.display = 'none';
      const newPw = overlay.querySelector('#mNew').value, confPw = overlay.querySelector('#mConf').value;
      if (newPw !== confPw) { msg.className = 'alert error'; msg.textContent = 'Passwords do not match'; msg.style.display = 'block'; return; }
      btn.disabled = true; btn.textContent = 'Saving…';
      try {
        await api('/api/auth/change-password', { method: 'POST', body: JSON.stringify({ current_password: overlay.querySelector('#mCur').value, new_password: newPw }) });
        msg.className = 'alert success'; msg.textContent = 'Password changed successfully'; msg.style.display = 'block'; btn.disabled = false; btn.textContent = 'Save';
      } catch (err) { msg.className = 'alert error'; msg.textContent = err.error || 'Failed'; msg.style.display = 'block'; btn.disabled = false; btn.textContent = 'Save'; }
    };
  }

  function openPolicyMenu() {
    const area = $('#accountArea'); if (area) area.classList.remove('open');
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `<div class="modal" style="max-width:480px"><h3>Panel Policy</h3><p class="modal-desc">Operational rules for dashboard access.</p>
      <div class="card" style="padding:12px 14px"><div style="font-size:11px;line-height:1.9;color:var(--text-dim);font-family:var(--mono)">
        <b style="color:var(--text)">1.</b> Keep credentials private and rotate passwords when staff changes.<br>
        <b style="color:var(--text)">2.</b> Restrict admin access to trusted users only.<br>
        <b style="color:var(--text)">3.</b> Validate module source before installation from marketplace.<br>
        <b style="color:var(--text)">4.</b> Review extender health before enabling critical mitigation actions.
      </div></div>
      <div class="modal-actions" style="margin-top:10px"><button type="button" class="btn-cancel" id="policyClose">Close</button></div>
    </div>`;
    document.body.appendChild(overlay);
    overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
    overlay.querySelector('#policyClose').onclick = () => overlay.remove();
  }

  // ── Module Dashboard iframe ──
  function loadModDash(id) {
    const m = modDash.find(d => d.id === id); if (!m) return;
    curPage = 'mod:' + id; setActiveNavItem(curPage);
    const curTheme = localStorage.getItem('ip_theme') || 'default';
    $('#pageContent').innerHTML = `<iframe class="module-frame" src="${m.dashboardUrl}?theme=${encodeURIComponent(curTheme)}"></iframe>`;
  }

  // ── WebSocket ──
  function connectWs() {
    if (ws) { ws.close(); ws = null; }
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(proto + '//' + location.host + '/ws/live');
    ws.onmessage = ev => {
      try {
        const msg = JSON.parse(ev.data);
        if (msg.type === 'status' && curPage === 'overview') {
          const p = $('#liveP'); if (p) p.textContent = msg.players;
          const mm = $('#liveM'); if (mm) mm.textContent = msg.heap_used_mb + ' / ' + msg.heap_max_mb + ' MB';
          const uu = $('#liveU');
          if (uu) { const ms = msg.uptime_ms, sec = Math.floor(ms/1000), min = Math.floor(sec/60), hr = Math.floor(min/60), dy = Math.floor(hr/24); uu.textContent = dy + 'd ' + (hr%24) + 'h ' + (min%60) + 'm ' + (sec%60) + 's'; }
          playerHist.push(msg.players); memHist.push(msg.heap_used_mb);
          if (playerHist.length > MAX_HIST) playerHist.shift();
          if (memHist.length > MAX_HIST) memHist.shift();
          updateChartDisplay('chartPlayers', 'chartValP', 'mm-players', playerHist, '--accent', '',    false);
          updateChartDisplay('chartMemory',  'chartValM', 'mm-mem',     memHist,    '--blue',   ' MB', true, msg.heap_max_mb);
        }
        if (msg.type === 'log' && curPage === 'logs') {
          const c = $('#logContainer'); if (!c) return;
          const cl = (msg.level || '').toLowerCase(), t = msg.timestamp ? new Date(msg.timestamp).toLocaleTimeString() : '';
          c.innerHTML += `<div class="log-entry ${cl}"><span class="log-time">${t}</span> <span class="log-level">[${msg.level}]</span> <span class="log-source">[${msg.moduleId || ''}]</span> ${esc(msg.message)}</div>`;
          c.scrollTop = c.scrollHeight;
        }
      } catch {}
    };
    ws.onclose = () => { setTimeout(() => { if (document.querySelector('.dashboard')) connectWs(); }, 5000); };
    ws.onerror = () => { ws.close(); };
  }

  function esc(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  init();
</script>
</body>
</html>
