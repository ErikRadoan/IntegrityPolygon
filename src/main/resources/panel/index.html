<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>IntegrityPolygon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════
   IntegrityPolygon — Admin Panel
   Dark theme, glassmorphism accents, Inter font
   ═══════════════════════════════════════════════════ */

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg-base:    #07080f;
  --bg-surface: #0d0f1a;
  --bg-card:    #121425;
  --bg-input:   #161830;
  --bg-hover:   #1a1d35;
  --bg-active:  #1f2242;

  --border:     rgba(255,255,255,.06);
  --border-hl:  rgba(255,255,255,.12);

  --text:       #e4e6f0;
  --text-dim:   #8b8ea8;
  --text-muted: #555770;

  --accent:     #22d3a7;
  --accent-dim: rgba(34,211,167,.12);
  --blue:       #3b82f6;
  --blue-dim:   rgba(59,130,246,.12);
  --red:        #f43f5e;
  --red-dim:    rgba(244,63,94,.1);
  --amber:      #f59e0b;
  --green:      #22c55e;
  --green-dim:  rgba(34,197,94,.1);

  --radius-sm:  6px;
  --radius:     10px;
  --radius-lg:  14px;
  --radius-xl:  20px;

  --font:       'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  --mono:       'JetBrains Mono', 'SF Mono', 'Cascadia Code', Consolas, monospace;

  --shadow:     0 1px 3px rgba(0,0,0,.3), 0 8px 24px rgba(0,0,0,.2);
  --shadow-lg:  0 4px 12px rgba(0,0,0,.4), 0 16px 48px rgba(0,0,0,.3);
  --glow:       0 0 20px rgba(34,211,167,.08);
}

/* ── Color Themes ── */
[data-theme="midnight"] {
  --bg-base:    #0a0a0f;
  --bg-surface: #101018;
  --bg-card:    #161620;
  --bg-input:   #1c1c28;
  --bg-hover:   #222230;
  --bg-active:  #2a2a3a;
  --border:     rgba(255,255,255,.05);
  --border-hl:  rgba(255,255,255,.10);
  --text:       #d8d8e8;
  --text-dim:   #7878a0;
  --text-muted: #505068;
  --accent:     #818cf8;
  --accent-dim: rgba(129,140,248,.12);
  --glow:       0 0 20px rgba(129,140,248,.08);
}

[data-theme="nord"] {
  --bg-base:    #2e3440;
  --bg-surface: #3b4252;
  --bg-card:    #434c5e;
  --bg-input:   #4c566a;
  --bg-hover:   #525d73;
  --bg-active:  #5a657c;
  --border:     rgba(216,222,233,.08);
  --border-hl:  rgba(216,222,233,.16);
  --text:       #eceff4;
  --text-dim:   #d8dee9;
  --text-muted: #a0aec0;
  --accent:     #88c0d0;
  --accent-dim: rgba(136,192,208,.12);
  --blue:       #81a1c1;
  --blue-dim:   rgba(129,161,193,.12);
  --red:        #bf616a;
  --red-dim:    rgba(191,97,106,.12);
  --amber:      #ebcb8b;
  --green:      #a3be8c;
  --green-dim:  rgba(163,190,140,.12);
  --glow:       0 0 20px rgba(136,192,208,.08);
}

[data-theme="emerald"] {
  --bg-base:    #041210;
  --bg-surface: #081c18;
  --bg-card:    #0c2620;
  --bg-input:   #103028;
  --bg-hover:   #143830;
  --bg-active:  #184038;
  --border:     rgba(34,197,94,.08);
  --border-hl:  rgba(34,197,94,.15);
  --text:       #d4f0e0;
  --text-dim:   #6cc898;
  --text-muted: #3a7858;
  --accent:     #34d399;
  --accent-dim: rgba(52,211,153,.12);
  --blue:       #2dd4bf;
  --blue-dim:   rgba(45,212,191,.12);
  --glow:       0 0 20px rgba(52,211,153,.1);
}

[data-theme="light"] {
  --bg-base:    #f5f6fa;
  --bg-surface: #ffffff;
  --bg-card:    #ffffff;
  --bg-input:   #f0f1f5;
  --bg-hover:   #e8eaf0;
  --bg-active:  #e0e2eb;
  --border:     rgba(0,0,0,.08);
  --border-hl:  rgba(0,0,0,.14);
  --text:       #1a1a2e;
  --text-dim:   #555770;
  --text-muted: #8b8ea8;
  --accent:     #0d9373;
  --accent-dim: rgba(13,147,115,.08);
  --blue:       #2563eb;
  --blue-dim:   rgba(37,99,235,.08);
  --red:        #dc2626;
  --red-dim:    rgba(220,38,38,.06);
  --amber:      #d97706;
  --green:      #16a34a;
  --green-dim:  rgba(22,163,74,.06);
  --shadow:     0 1px 3px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.06);
  --shadow-lg:  0 4px 12px rgba(0,0,0,.08), 0 12px 36px rgba(0,0,0,.08);
  --glow:       0 0 20px rgba(13,147,115,.05);
}

[data-theme="rose"] {
  --bg-base:    #120a0d;
  --bg-surface: #1a1015;
  --bg-card:    #22161c;
  --bg-input:   #2a1c24;
  --bg-hover:   #32222c;
  --bg-active:  #3a2834;
  --border:     rgba(244,63,94,.06);
  --border-hl:  rgba(244,63,94,.14);
  --text:       #f0dce4;
  --text-dim:   #b07888;
  --text-muted: #704858;
  --accent:     #fb7185;
  --accent-dim: rgba(251,113,133,.12);
  --blue:       #e879f9;
  --blue-dim:   rgba(232,121,249,.12);
  --glow:       0 0 20px rgba(251,113,133,.08);
}

body {
  font-family: var(--font);
  background: var(--bg-base);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  transition: background .3s, color .3s;
}

a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

/* ── Animations ── */
@keyframes fadeIn  { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }
@keyframes slideUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:none; } }
@keyframes spin    { to   { transform:rotate(360deg); } }

.fade-in  { animation: fadeIn .3s ease both; }
.slide-up { animation: slideUp .35s ease both; }

/* ── Spinner ── */
.spinner {
  width: 18px; height: 18px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .6s linear infinite;
}

.loading-screen {
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; flex-direction: column; gap: 12px;
  color: var(--text-dim);
}

/* ═══════════════════════════════════════════════════
   Auth Screens (Login, Change Password, Setup)
   ═══════════════════════════════════════════════════ */
.auth-wrapper {
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 24px;
  background:
    radial-gradient(ellipse 60% 50% at 50% 0%, rgba(34,211,167,.04) 0%, transparent 60%),
    radial-gradient(ellipse 40% 40% at 80% 20%, rgba(59,130,246,.03) 0%, transparent 50%),
    var(--bg-base);
}

.auth-card {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-xl);
  padding: 40px;
  width: 100%; max-width: 420px;
  text-align: center;
  animation: slideUp .4s ease;
  box-shadow: var(--shadow-lg);
}

.auth-card .logo {
  font-size: 22px; font-weight: 700;
  background: linear-gradient(135deg, var(--accent), var(--blue));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 4px;
}

.auth-card .subtitle {
  color: var(--text-muted); font-size: 12px;
  margin-bottom: 32px; letter-spacing: .5px;
}

.auth-card h2 {
  font-size: 16px; font-weight: 600;
  margin-bottom: 6px;
}

.auth-card .desc {
  color: var(--text-dim); font-size: 13px;
  margin-bottom: 24px; line-height: 1.6;
}

/* ── Form elements ── */
.field { text-align: left; margin-bottom: 16px; }
.field label {
  display: block; font-size: 11px; font-weight: 600;
  color: var(--text-dim); text-transform: uppercase;
  letter-spacing: .8px; margin-bottom: 6px;
}
.field input, .field select {
  width: 100%; padding: 10px 14px;
  background: var(--bg-input); border: 1px solid var(--border);
  border-radius: var(--radius); color: var(--text);
  font-family: var(--font); font-size: 14px;
  transition: border-color .2s, box-shadow .2s;
}
.field input:focus, .field select:focus {
  outline: none; border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-dim);
}
.field input::placeholder { color: var(--text-muted); }
.field .hint { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

.btn-primary {
  display: block; width: 100%; padding: 12px;
  background: linear-gradient(135deg, var(--accent), var(--blue));
  color: #fff; border: none; border-radius: var(--radius);
  font-family: var(--font); font-size: 14px; font-weight: 600;
  cursor: pointer; transition: opacity .2s, transform .15s;
  margin-top: 8px;
}
.btn-primary:hover { opacity: .9; transform: translateY(-1px); }
.btn-primary:active { transform: translateY(0); }
.btn-primary:disabled { opacity: .3; cursor: not-allowed; transform: none; }

.alert {
  margin-top: 16px; padding: 10px 14px;
  border-radius: var(--radius); font-size: 13px;
  display: none; text-align: left;
}
.alert.error {
  display: block;
  background: var(--red-dim); color: var(--red);
  border: 1px solid rgba(244,63,94,.2);
}
.alert.success {
  display: block;
  background: var(--green-dim); color: var(--green);
  border: 1px solid rgba(34,197,94,.2);
}

.msg { padding:6px 10px; border-radius:var(--radius-sm); font-size:12px; display:none; }
.msg.ok { display:block; background:var(--green-dim); color:var(--green); }
.msg.err { display:block; background:var(--red-dim); color:var(--red); }

/* ═══════════════════════════════════════════════════
   Dashboard Layout
   ═══════════════════════════════════════════════════ */
.dashboard { display: flex; min-height: 100vh; }

/* ── Sidebar ── */
.sidebar {
  width: 240px;
  background: var(--bg-surface);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  position: fixed; top: 0; left: 0; bottom: 0;
  z-index: 100;
}

.sidebar-header {
  padding: 20px 20px 16px;
  border-bottom: 1px solid var(--border);
}
.sidebar-header .brand-logo {
  height: 46px; width: auto; display: block;
}
.sidebar-header .version {
  font-size: 11px; color: var(--text-muted); margin-top: 4px;
}

.sidebar-nav {
  flex: 1; padding: 8px 0; overflow-y: auto;
}

.nav-section { padding: 0 12px; margin-top: 16px; }
.nav-section:first-child { margin-top: 4px; }

.nav-label {
  font-size: 10px; text-transform: uppercase;
  letter-spacing: 1.4px; color: var(--text-muted);
  padding: 0 8px; margin-bottom: 4px; font-weight: 700;
}

.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 12px; border-radius: var(--radius);
  cursor: pointer; color: var(--text-dim); font-size: 13px;
  font-weight: 500; transition: all .12s; margin-bottom: 1px;
  user-select: none;
}
.nav-item:hover { background: var(--bg-hover); color: var(--text); }
.nav-item.active { background: var(--bg-active); color: var(--accent); }
.nav-item svg {
  width: 16px; height: 16px; flex-shrink: 0;
  stroke: currentColor; fill: none;
  stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
}

.sidebar-footer {
  padding: 16px 20px;
  border-top: 1px solid var(--border);
}
.sidebar-footer .user-info {
  color: var(--text-dim); font-size: 12px;
  display: flex; align-items: center; gap: 8px;
}
.sidebar-footer .user-info svg {
  width: 14px; height: 14px;
  stroke: currentColor; fill: none; stroke-width: 2;
}
.sidebar-footer .sign-out {
  color: var(--red); cursor: pointer;
  margin-top: 8px; font-size: 11px; font-weight: 500;
  display: flex; align-items: center; gap: 6px;
  opacity: .8; transition: opacity .15s;
}
.sidebar-footer .sign-out:hover { opacity: 1; }
.sidebar-footer .sign-out svg {
  width: 13px; height: 13px;
  stroke: currentColor; fill: none; stroke-width: 2;
}

/* ── Main Content ── */
.main-content {
  margin-left: 240px; flex: 1;
  padding: 28px 32px; min-height: 100vh;
}

.page-header {
  margin-bottom: 24px; animation: fadeIn .3s ease;
}
.page-header h2 {
  font-size: 20px; font-weight: 700;
}
.page-header p {
  color: var(--text-dim); font-size: 13px; margin-top: 2px;
}

/* ── Stat Cards ── */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 12px; margin-bottom: 20px;
}
.stat-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px;
  transition: border-color .2s, box-shadow .2s;
}
.stat-card:hover {
  border-color: var(--border-hl);
  box-shadow: var(--glow);
}
.stat-card .stat-label {
  font-size: 11px; font-weight: 600;
  text-transform: uppercase; letter-spacing: .6px;
  color: var(--text-dim);
}
.stat-card .stat-value {
  font-size: 26px; font-weight: 700; margin-top: 4px;
}
.stat-card .stat-value.highlight { color: var(--accent); }

/* ── Cards ── */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 12px;
}
.card h3 {
  font-size: 14px; font-weight: 600; margin-bottom: 12px;
}

.list-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}
.list-row:last-child { border-bottom: none; }
.list-row .row-name { font-weight: 500; font-size: 14px; }
.list-row .row-meta { color: var(--text-dim); font-size: 13px; }

/* ── Badges ── */
.badge {
  display: inline-flex; align-items: center;
  padding: 3px 10px; border-radius: 20px;
  font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .6px;
}
.badge-green  { background: var(--green-dim); color: var(--green); border: 1px solid rgba(34,197,94,.2); }
.badge-red    { background: var(--red-dim);   color: var(--red);   border: 1px solid rgba(244,63,94,.2); }
.badge-blue   { background: var(--blue-dim);  color: var(--blue);  border: 1px solid rgba(59,130,246,.2); }
.badge-gray   { background: rgba(255,255,255,.04); color: var(--text-muted); border: 1px solid var(--border); }

/* ── Buttons ── */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 14px; font-size: 12px; font-weight: 500;
  border-radius: var(--radius-sm); border: 1px solid var(--border);
  background: var(--bg-input); color: var(--text);
  cursor: pointer; transition: all .12s;
  font-family: var(--font);
}
.btn:hover { border-color: var(--accent); color: var(--accent); }
.btn:disabled { opacity: .4; cursor: not-allowed; }
.btn-danger { color: var(--red); }
.btn-danger:hover { border-color: var(--red); color: var(--red); }
.btn-success { color: var(--green); }
.btn-success:hover { border-color: var(--green); }
.btn svg {
  width: 13px; height: 13px;
  stroke: currentColor; fill: none; stroke-width: 2;
}

/* ── Toggle Switch ── */
.toggle { position: relative; width: 38px; height: 22px; cursor: pointer; display: inline-block; }
.toggle input { display: none; }
.toggle .track {
  position: absolute; inset: 0;
  background: var(--bg-active); border-radius: 22px;
  transition: background .2s; border: 1px solid var(--border);
}
.toggle .track::before {
  content: ''; position: absolute;
  width: 16px; height: 16px; left: 2px; top: 2px;
  background: var(--text-muted); border-radius: 50%;
  transition: transform .2s, background .2s;
}
.toggle input:checked + .track {
  background: var(--accent); border-color: var(--accent);
}
.toggle input:checked + .track::before {
  transform: translateX(16px); background: #fff;
}

/* ── Charts ── */
.chart-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 20px;
}
.chart-card h3 {
  font-size: 13px; font-weight: 600; margin-bottom: 10px;
  color: var(--text-dim);
}
.chart-card canvas { width: 100%; height: 100px; }

.charts-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 12px; margin-bottom: 16px;
}

/* ── Monitoring & Logs ── */
.log-container {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  max-height: 520px; overflow-y: auto;
  font-family: var(--mono); font-size: 12px; line-height: 1.7;
}
.log-entry { padding: 1px 0; }
.log-entry .log-time { color: var(--text-muted); }
.log-entry .log-source { color: var(--blue); }
.log-entry.warn .log-level  { color: var(--amber); }
.log-entry.error .log-level { color: var(--red); }
.log-entry.info .log-level  { color: var(--green); }

.log-toolbar {
  display: flex; gap: 8px; margin-bottom: 10px;
  align-items: center; flex-wrap: wrap;
}
.log-toolbar select {
  padding: 6px 10px;
  background: var(--bg-input); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text);
  font-family: var(--font); font-size: 12px;
}
.log-toolbar select:focus, .log-toolbar input:focus {
  outline: none; border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-dim);
}

/* ── Marketplace ── */
.marketplace-header {
  display: flex; align-items: center; gap: 14px; margin-bottom: 8px;
}
.marketplace-header .mh-count {
  background: var(--accent-dim); color: var(--accent);
  font-size: 11px; font-weight: 600; padding: 2px 10px;
  border-radius: 20px;
}
.marketplace-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 16px;
}
.market-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 0;
  overflow: hidden;
  transition: transform .22s cubic-bezier(.4,0,.2,1), border-color .22s, box-shadow .22s;
  opacity: 0; transform: translateY(18px);
  animation: mc-appear .45s cubic-bezier(.4,0,.2,1) forwards;
}
.market-card:nth-child(1) { animation-delay: .04s; }
.market-card:nth-child(2) { animation-delay: .1s; }
.market-card:nth-child(3) { animation-delay: .16s; }
.market-card:nth-child(4) { animation-delay: .22s; }
.market-card:nth-child(5) { animation-delay: .28s; }
.market-card:nth-child(6) { animation-delay: .34s; }
@keyframes mc-appear {
  to { opacity: 1; transform: translateY(0); }
}
.market-card:hover {
  transform: translateY(-3px);
  border-color: var(--accent);
  box-shadow: 0 8px 30px rgba(0,0,0,.25), 0 0 0 1px var(--accent-dim);
}
.mc-top {
  display: flex; align-items: center; gap: 14px;
  padding: 20px 20px 0;
}
.mc-icon {
  width: 48px; height: 48px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: transform .25s cubic-bezier(.4,0,.2,1);
}
.market-card:hover .mc-icon { transform: scale(1.08) rotate(-3deg); }
.mc-icon svg {
  width: 26px; height: 26px; stroke: #fff;
  fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round;
}
.mc-icon.ic-antibot    { background: linear-gradient(135deg, #ef4444, #f97316); }
.mc-icon.ic-account    { background: linear-gradient(135deg, #8b5cf6, #6366f1); }
.mc-icon.ic-geo        { background: linear-gradient(135deg, #06b6d4, #3b82f6); }
.mc-icon.ic-identity   { background: linear-gradient(135deg, #22c55e, #14b8a6); }
.mc-icon.ic-default    { background: linear-gradient(135deg, var(--accent), var(--blue)); }
.mc-meta {
  flex: 1; min-width: 0;
}
.mc-meta .mc-name {
  font-weight: 600; font-size: 15px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.mc-meta .mc-version {
  font-size: 11px; color: var(--text-muted); margin-top: 2px;
}
.mc-body {
  padding: 12px 20px 0;
}
.mc-desc {
  color: var(--text-dim); font-size: 13px;
  line-height: 1.55; display: -webkit-box;
  -webkit-line-clamp: 3; -webkit-box-orient: vertical;
  overflow: hidden;
}
.mc-footer {

.mc-author {

.mc-author svg {
  width: 12px; height: 12px; stroke: var(--text-muted);

}

.mc-install-btn.install {

}
.mc-install-btn.installed {
  background: var(--accent-dim); color: var(--accent);

}
.mc-install-btn.installing {
  background: var(--accent-dim); color: var(--accent);
  cursor: wait; position: relative; overflow: hidden;
}
.mc-install-btn.installing::after {
  content: ''; position: absolute; left: 0; top: 0;
  height: 100%; width: 40%;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  animation: mc-shimmer 1.2s infinite;
}
@keyframes mc-shimmer {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(350%); }
}
.mc-install-btn.failed {

function applyTheme(themeId) {
  if (themeId === 'default') document.documentElement.removeAttribute('data-theme');
  else document.documentElement.setAttribute('data-theme', themeId);
  localStorage.setItem('ip_theme', themeId);
  // Broadcast to any module dashboard iframes
  document.querySelectorAll('iframe.module-frame').forEach(f => {
    try { f.contentWindow.postMessage({ type: 'ip-theme-change', theme: themeId }, '*'); } catch {}
  });
}

// Apply saved theme immediately
(function() {
  const saved = localStorage.getItem('ip_theme');
  if (saved && saved !== 'default') document.documentElement.setAttribute('data-theme', saved);
})();

// ── State ──
const API = location.origin;
const $ = s => document.querySelector(s);
const app = $('#app');

let token = localStorage.getItem('ip_token');
let ws = null;
let curPage = 'overview';
let modDash = [];
let playerHist = [];
let memHist = [];
const MAX_HIST = 60;

// ── API helper ──
async function api(path, opts = {}) {
  const headers = { 'Content-Type': 'application/json', ...(opts.headers || {}) };
  if (token) headers['Authorization'] = 'Bearer ' + token;
  try {
    const res = await fetch(API + path, { ...opts, headers });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw { status: res.status, ...data };
    return data;
  } catch (err) {
    if (err.status) throw err;
    throw { status: 0, error: 'Network error — cannot reach server' };
  }
}

// ── Init ──
async function init() {
  try {
    const st = await api('/api/setup/status');
    if (!token) { renderLogin(); return; }
    try { await api('/api/health'); }
    catch (e) {
      if (e.status === 401 || e.status === 403) {
        token = null; localStorage.removeItem('ip_token'); renderLogin(); return;
      }
      // Network error but we have a token — try showing dashboard anyway
    }
    if (st.must_change_password) renderChangePw();
    else if (!st.setup_completed) renderSetup();
    else renderDash();
  } catch (e) {
    if (token) {
      // We have a token but setup status failed — try dashboard
      try { renderDash(); return; } catch {}
    }
    app.innerHTML = `
      <div class="loading-screen">
        <div style="text-align:center">
          <div style="font-size:20px;font-weight:700;margin-bottom:8px;color:var(--text)">IntegrityPolygon</div>
          <div style="color:var(--red);margin-bottom:12px">${esc(e.error || 'Cannot connect to server')}</div>
          <button class="btn-primary" style="width:auto;padding:10px 24px;display:inline-block" onclick="location.reload()">Retry</button>
        </div>
      </div>`;
  }
}

function renderLogin() {
  app.innerHTML = `
  <div class="auth-wrapper"><div class="auth-card">
    <div class="logo">IntegrityPolygon</div>
    <div class="subtitle">Security Management Panel</div>
    <h2>Sign In</h2>

      <button class="btn-primary" type="submit">Sign In</button>
    </form>
    <div id="loginMsg" class="alert"></div>
  </div></div>`;

  $('#loginForm').onsubmit = async e => {
    e.preventDefault();
    const btn = $('#loginForm .btn-primary'), msg = $('#loginMsg');
    btn.disabled = true; btn.textContent = 'Signing in\u2026';
    msg.className = 'alert'; msg.style.display = 'none';
    try {
      const d = await api('/api/auth/login', {
        method: 'POST',
        body: JSON.stringify({ username: $('#lu').value, password: $('#lp').value })
      });
      token = d.token; localStorage.setItem('ip_token', token);
      if (d.must_change_password) renderChangePw();
      else if (!d.setup_completed) renderSetup();
      else renderDash();
    } catch (err) {
      msg.className = 'alert error';
      msg.textContent = err.error || 'Invalid credentials';
      msg.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Sign In';
    }
  };
}

function renderChangePw() {
  app.innerHTML = `
  <div class="auth-wrapper"><div class="auth-card">
    <div class="logo">IntegrityPolygon</div>
    <div class="subtitle">Security Management Panel</div>
    <h2>Change Your Password</h2>
    <p class="desc">Set a new password to continue (minimum 8 characters).</p>
    <form id="cpForm">
      <div class="field"><label>Current Password</label><input type="password" id="cp1" required></div>
      <div class="field"><label>New Password</label><input type="password" id="cp2" required minlength="8"></div>
      <div class="field"><label>Confirm</label><input type="password" id="cp3" required minlength="8"></div>
      <button class="btn-primary" type="submit">Set New Password</button>
    </form>

  $('#cpForm').onsubmit = async e => {
    e.preventDefault();
    const msg = $('#cpMsg'), btn = $('#cpForm .btn-primary');
    msg.className = 'alert'; msg.style.display = 'none';
    if ($('#cp2').value !== $('#cp3').value) {
      msg.className = 'alert error'; msg.textContent = 'Passwords do not match';
      msg.style.display = 'block'; return;
    }
    btn.disabled = true; btn.textContent = 'Saving\u2026';
    try {
      const d = await api('/api/auth/change-password', {
        method: 'POST',
        body: JSON.stringify({ current_password: $('#cp1').value, new_password: $('#cp2').value })
      });
      token = d.token; localStorage.setItem('ip_token', token);
      renderSetup();
    } catch (err) {
      msg.className = 'alert error'; msg.textContent = err.error || 'Failed';
      msg.style.display = 'block'; btn.disabled = false; btn.textContent = 'Set New Password';
    }
  };
}

function renderSetup() {
  app.innerHTML = `
  <div class="auth-wrapper"><div class="auth-card" style="max-width:480px">
    <div class="logo">IntegrityPolygon</div>
    <div class="subtitle">Security Management Panel</div>

    <form id="setupForm">
      <div class="field"><label>Proxy Host</label><input id="sh" placeholder="e.g. omega.goodhost.cz" required><div class="hint">Public address players connect to</div></div>
      <div class="field"><label>Proxy Port</label><input type="number" id="sp" placeholder="e.g. 25565" required></div>
      <div class="field"><label>Web Panel Port</label><input type="number" id="swp" required><div class="hint">Port the dashboard is served on (must be open externally)</div></div>
      <div class="field"><label>Extender TCP Port</label><input type="number" id="sep" required><div class="hint">Port for Paper server communication (must be open if Paper is on a different machine)</div></div>
      <div class="field"><label>Web Bind Address</label><input id="swb" value="0.0.0.0"></div>
      <div class="field"><label>Server Name <span style="color:var(--text-muted)">(optional)</span></label><input id="sn" placeholder="My Network"></div>
      <button class="btn-primary" type="submit">Complete Setup</button>
    </form>
    <div id="setupMsg" class="alert"></div>
  </div></div>`;

  $('#swp').value = location.port || '3490';
  $('#sep').value = (+$('#swp').value || 3490) + 1;
  // Auto-update extender port when web port changes
  $('#swp').addEventListener('input', () => {
    const wp = +$('#swp').value;
    if (wp && !$('#sep').dataset.manual) $('#sep').value = wp + 1;
  });
  $('#sep').addEventListener('input', () => { $('#sep').dataset.manual = '1'; });
  $('#setupForm').onsubmit = async e => {
    e.preventDefault();
    const msg = $('#setupMsg'), btn = $('#setupForm .btn-primary');
    msg.className = 'alert'; msg.style.display = 'none';
    btn.disabled = true; btn.textContent = 'Saving\u2026';
    try {
      await api('/api/setup', {
        method: 'POST',
        body: JSON.stringify({
          proxy_host: $('#sh').value, proxy_port: +$('#sp').value,
          web_port: +$('#swp').value, web_bind: $('#swb').value || '0.0.0.0',
          extender_port: +$('#sep').value,
          server_name: $('#sn').value
        })
      });
      msg.className = 'alert success';
      msg.innerHTML = '<b>Setup complete!</b> Restart your Velocity proxy.';
      msg.style.display = 'block'; btn.textContent = 'Waiting for restart\u2026';
      const iv = setInterval(async () => {
        try { const s = await api('/api/setup/status'); if (s.setup_completed) { clearInterval(iv); renderDash(); } } catch {}
      }, 3000);
    } catch (err) {
      msg.className = 'alert error'; msg.textContent = err.error || 'Failed';
      msg.style.display = 'block'; btn.disabled = false; btn.textContent = 'Complete Setup';
    }
  };
}

// ── Mini Chart ──
function drawChart(id, data, color, maxLine) {
  const canvas = document.getElementById(id); if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const w = canvas.parentElement.clientWidth - 40;
  const h = 100;
  canvas.width = w * 2; canvas.height = h * 2;
  canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
  ctx.scale(2, 2); ctx.clearRect(0, 0, w, h);
  if (data.length < 2) return;

  let max = Math.max(...data, 1);
  if (maxLine) max = Math.max(max, maxLine);
  const pad = 4, gw = w - pad * 2, gh = h - pad * 2;

  ctx.strokeStyle = 'rgba(255,255,255,.03)'; ctx.lineWidth = 1;
  for (let i = 0; i < 4; i++) {
    const y = pad + gh * (i / 3);
    ctx.beginPath(); ctx.moveTo(pad, y); ctx.lineTo(pad + gw, y); ctx.stroke();
  }

  if (maxLine) {
    const y = pad + gh * (1 - maxLine / max);
    ctx.strokeStyle = 'rgba(244,63,94,.15)';
    ctx.setLineDash([4, 4]);
    ctx.beginPath(); ctx.moveTo(pad, y); ctx.lineTo(pad + gw, y); ctx.stroke();
    ctx.setLineDash([]);
  }

  ctx.beginPath();
  data.forEach((v, i) => {
    const x = pad + (i / (data.length - 1)) * gw;
    const y = pad + gh * (1 - v / max);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.lineTo(pad + gw, pad + gh); ctx.lineTo(pad, pad + gh); ctx.closePath();
  const grad = ctx.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0, color + '30'); grad.addColorStop(1, color + '03');
  ctx.fillStyle = grad; ctx.fill();

  ctx.beginPath();
  data.forEach((v, i) => {
    const x = pad + (i / (data.length - 1)) * gw;
    const y = pad + gh * (1 - v / max);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.stroke();

  const lx = pad + gw, ly = pad + gh * (1 - data[data.length - 1] / max);
  ctx.beginPath(); ctx.arc(lx, ly, 3, 0, Math.PI * 2);
  ctx.fillStyle = color; ctx.fill();
}

async function _refreshExtenders() {
  try {
    const status = await api('/api/status');
    const servers = status.servers || [];

    // Render connection info only once
    if (!_extendersInitialized) {
      try {
        const setupInfo = await api('/api/setup/status');
        const secret = setupInfo.extender_secret || '???';
        const extPort = setupInfo.extender_port || '3491';
        $('#extenderSecret').innerHTML = `
          <h3 style="font-size:14px;font-weight:600;margin-bottom:8px">Extender Connection Info</h3>
          <p style="color:var(--text-dim);font-size:12px;margin-bottom:8px">Copy these values to each Paper server's <code>plugins/IntegrityPolygon-Extender/config.yml</code></p>
          <div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;font-family:monospace;font-size:12px;word-break:break-all">
            <div style="margin-bottom:4px"><span style="color:var(--text-muted)">proxy-host:</span> <span style="color:var(--accent)">${esc(location.hostname)}</span></div>
            <div style="margin-bottom:4px"><span style="color:var(--text-muted)">proxy-port:</span> <span style="color:var(--accent)">${extPort}</span></div>
            <div><span style="color:var(--text-muted)">secret:</span> <span style="color:var(--amber)">${esc(secret)}</span>
              <button class="btn btn-sm" style="margin-left:8px;padding:2px 8px" onclick="navigator.clipboard.writeText('${esc(secret)}')">Copy</button></div>
          </div>`;
      } catch (ignored) {}
    }

    // Build or update server cards
    if (!_extendersInitialized) {
      _renderExtenderCards(servers);
      _extendersInitialized = true;
    } else {
      _updateExtenderCards(servers);
    }
  } catch (e) {
    if (!_extendersInitialized) {
      $('#extenderList').innerHTML = '<div class="card"><div style="color:var(--red)">' + esc(e.error || 'Failed to load server info') + '</div></div>';
    }
  }
}

        </div>

          <div style="font-weight:600;font-size:14px;margin-bottom:4px;color:var(--amber)">No Extenders Connected</div>

    html += '<div class="card"><div style="color:var(--text-muted)">No backend servers registered in Velocity.</div></div>';

    if (enrolled) {
      const tpsVal = typeof v.tps === 'number' ? v.tps.toFixed(1) : '?';
      const tpsColor = v.tps >= 19 ? 'var(--green)' : v.tps >= 15 ? 'var(--amber)' : 'var(--red)';
      const memPct = v.memory_max_mb > 0 ? Math.round(v.memory_used_mb / v.memory_max_mb * 100) : 0;
      const ago = v.last_heartbeat ? Math.round((Date.now() - v.last_heartbeat) / 1000) : '?';
      html += '<div class="stats-grid" style="margin-bottom:0">';
      html += '<div class="stat-card"><div class="stat-label">TPS</div><div class="stat-value" data-ext-tps style="color:' + tpsColor + '">' + tpsVal + '</div></div>';
      html += '<div class="stat-card"><div class="stat-label">Memory</div><div class="stat-value" data-ext-mem>' + v.memory_used_mb + '<span style="font-size:14px;color:var(--text-dim)">/' + v.memory_max_mb + ' MB (' + memPct + '%)</span></div></div>';
      html += '<div class="stat-card"><div class="stat-label">Players</div><div class="stat-value highlight" data-ext-players>' + v.players + '<span style="font-size:14px;color:var(--text-dim)">/' + (v.max_players || '?') + '</span></div></div>';
      html += '<div class="stat-card"><div class="stat-label">CPU</div><div class="stat-value" data-ext-cpu>' + (v.cpu_usage >= 0 ? v.cpu_usage.toFixed(1) + '%' : 'N/A') + '</div></div>';

    }
    html += '</div>';

}

function _updateExtenderCards(servers) {
  servers.forEach(v => {
    const card = document.querySelector('[data-server="' + esc(v.name) + '"]');
    if (!card || !v.extender_enrolled) return;
    const tps = card.querySelector('[data-ext-tps]');
    if (tps) {
      const tpsVal = typeof v.tps === 'number' ? v.tps.toFixed(1) : '?';
      const tpsColor = v.tps >= 19 ? 'var(--green)' : v.tps >= 15 ? 'var(--amber)' : 'var(--red)';
      tps.textContent = tpsVal; tps.style.color = tpsColor;
    }
    const mem = card.querySelector('[data-ext-mem]');
    if (mem) {
      const memPct = v.memory_max_mb > 0 ? Math.round(v.memory_used_mb / v.memory_max_mb * 100) : 0;
      mem.innerHTML = v.memory_used_mb + '<span style="font-size:14px;color:var(--text-dim)">/' + v.memory_max_mb + ' MB (' + memPct + '%)</span>';
    }
    const pl = card.querySelector('[data-ext-players]');
    if (pl) pl.innerHTML = v.players + '<span style="font-size:14px;color:var(--text-dim)">/' + (v.max_players || '?') + '</span>';
    const plBadge = card.querySelector('[data-ext-players-badge]');
    if (plBadge) plBadge.textContent = v.players + ' player' + (v.players !== 1 ? 's' : '');
    const cpu = card.querySelector('[data-ext-cpu]');
    if (cpu) cpu.textContent = (v.cpu_usage >= 0 ? v.cpu_usage.toFixed(1) + '%' : 'N/A');
    const hb = card.querySelector('[data-ext-hb]');
    if (hb) {
      const ago = v.last_heartbeat ? Math.round((Date.now() - v.last_heartbeat) / 1000) : '?';
      hb.textContent = ago + 's ago';
    }
  });
}

async function loadMonitoringCharts() {
  try {
    const d = await api('/api/monitoring/series');
    if (!d || !d.series) return;
    const series = d.series;

    drawMiniChart('chartPlayers', series['proxy.players'], { color: 'var(--accent)', label: 'Players' });
    drawMiniChart('chartMemory', series['proxy.memory_used_mb'], { color: 'var(--blue)', label: 'Used MB' });
    drawMiniChart('chartCpu', series['proxy.cpu'], { color: 'var(--amber)', label: 'CPU %', max: 100 });

    // Find TPS series (server.*.tps)
    const tpsSeries = Object.entries(series).filter(([k]) => k.endsWith('.tps'));
    if (tpsSeries.length > 0) {
      const canvas = document.getElementById('chartTps');
      if (canvas) {
        const ctx = canvas.getContext('2d');
        const w = canvas.parentElement.clientWidth - 32;
        canvas.width = w * (window.devicePixelRatio || 1);
        canvas.height = 120 * (window.devicePixelRatio || 1);
        canvas.style.width = w + 'px';
        canvas.style.height = '120px';
        ctx.scale(window.devicePixelRatio || 1, window.devicePixelRatio || 1);
        ctx.clearRect(0, 0, w, 120);
        const colors = ['#22d3a7', '#3b82f6', '#f59e0b', '#f43f5e', '#a855f7'];
        tpsSeries.forEach(([name, points], i) => {
          if (!points || !points.length) return;
          const c = colors[i % colors.length];
          const vals = points.map(p => p[1]);
          const max = 20;
          ctx.beginPath();
          vals.forEach((v, j) => {
            const x = (j / (vals.length - 1 || 1)) * w;
            const y = 110 - (v / max) * 100;
            j === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
          });
          ctx.strokeStyle = c;
          ctx.lineWidth = 1.5;
          ctx.stroke();
          // Label
          const server = name.replace('server.', '').replace('.tps', '');
          const lastV = vals[vals.length - 1];
          ctx.fillStyle = c;
          ctx.font = '10px Inter, sans-serif';
          ctx.fillText(server + ': ' + lastV.toFixed(1), 4, 12 + i * 14);
        });
      }
    }
  } catch {}
}

function drawMiniChart(canvasId, data, opts = {}) {
  const canvas = document.getElementById(canvasId);
  if (!canvas || !data || !data.length) return;
  const ctx = canvas.getContext('2d');
  const w = canvas.parentElement.clientWidth - 32;
  canvas.width = w * (window.devicePixelRatio || 1);
  canvas.height = 120 * (window.devicePixelRatio || 1);
  canvas.style.width = w + 'px';
  canvas.style.height = '120px';
  ctx.scale(window.devicePixelRatio || 1, window.devicePixelRatio || 1);
  ctx.clearRect(0, 0, w, 120);

  const vals = data.map(p => p[1]);
  const max = opts.max || Math.max(...vals, 1) * 1.1;

  // Fill
  const cs = getComputedStyle(document.documentElement);
  const c = opts.color || cs.getPropertyValue('--accent').trim();
  ctx.beginPath();
  ctx.moveTo(0, 110);
  vals.forEach((v, i) => {
    const x = (i / (vals.length - 1 || 1)) * w;
    const y = 110 - (v / max) * 100;
    ctx.lineTo(x, y);
  });
  ctx.lineTo(w, 110);
  ctx.closePath();
  ctx.fillStyle = c.startsWith('var(') ? cs.getPropertyValue(c.slice(4, -1)).trim() + '18' : c + '18';
  ctx.fill();

  // Line
  ctx.beginPath();
  vals.forEach((v, i) => {
    const x = (i / (vals.length - 1 || 1)) * w;
    const y = 110 - (v / max) * 100;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  const lineColor = c.startsWith('var(') ? cs.getPropertyValue(c.slice(4, -1)).trim() : c;
  ctx.strokeStyle = lineColor;
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Current value label
  const last = vals[vals.length - 1];
  ctx.fillStyle = lineColor;
  ctx.font = 'bold 13px Inter, sans-serif';
  ctx.fillText((opts.label || '') + ' ' + last.toFixed(1), 4, 14);
}

  try {

async function savePorts() {
  const webPort = parseInt($('#cfgWebPort')?.value);
  const extPort = parseInt($('#cfgExtPort')?.value);
  const msg = $('#portMsg');
  if (!msg) return;
  msg.className = 'msg'; msg.style.display = 'none';
  if (isNaN(webPort) || isNaN(extPort) || webPort < 1024 || webPort > 65535 || extPort < 1024 || extPort > 65535) {
    msg.className = 'msg err'; msg.style.display = 'block'; msg.textContent = 'Ports must be between 1024 and 65535'; return;
  }
  if (webPort === extPort) {
    msg.className = 'msg err'; msg.style.display = 'block'; msg.textContent = 'Web port and extender port cannot be the same'; return;
  }
  try {
    const r = await api('/api/config/ports', { method: 'PATCH', body: JSON.stringify({ web_port: webPort, extender_port: extPort }) });
    msg.className = 'msg ok'; msg.style.display = 'block'; msg.textContent = 'Saved';
    if (r.restart_required) {
      const banner = $('#portBanner');
      if (banner) { banner.style.display = 'block'; banner.textContent = '\u26a0 Port settings changed. Restart the server for changes to take effect.'; }
    }
  } catch (e) {
    msg.className = 'msg err'; msg.style.display = 'block'; msg.textContent = e.error || 'Failed to save';
  }
}

function connectWs() {
  if (ws) { ws.close(); ws = null; }
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(proto + '//' + location.host + '/ws/live?token=' + encodeURIComponent(token));

  ws.onmessage = ev => {
    try {
      const msg = JSON.parse(ev.data);

      if (msg.type === 'status' && curPage === 'overview') {
        const p = $('#liveP'); if (p) p.textContent = msg.players;
        const mm = $('#liveM'); if (mm) mm.textContent = msg.heap_used_mb + ' / ' + msg.heap_max_mb + ' MB';
        const uu = $('#liveU');
        if (uu) {
          const ms = msg.uptime_ms, sec = Math.floor(ms/1000), min = Math.floor(sec/60),
                hr = Math.floor(min/60), dy = Math.floor(hr/24);
          uu.textContent = dy + 'd ' + (hr%24) + 'h ' + (min%60) + 'm ' + (sec%60) + 's';
        }
        playerHist.push(msg.players); memHist.push(msg.heap_used_mb);
        if (playerHist.length > MAX_HIST) playerHist.shift();
        if (memHist.length > MAX_HIST) memHist.shift();
        drawChart('chartPlayers', playerHist, '#22d3a7');
        drawChart('chartMemory', memHist, '#3b82f6', msg.heap_max_mb);
      }

      if (msg.type === 'log' && curPage === 'logs') {
        const c = $('#logContainer'); if (!c) return;
        const cl = (msg.level || '').toLowerCase();
        const t = msg.timestamp ? new Date(msg.timestamp).toLocaleTimeString() : '';
        c.innerHTML += `<div class="log-entry ${cl}"><span class="log-time">${t}</span> <span class="log-level">[${msg.level}]</span> <span class="log-source">[${msg.moduleId || ''}]</span> ${esc(msg.message)}</div>`;
        c.scrollTop = c.scrollHeight;
      }
    } catch {}
  };

  ws.onclose = () => { setTimeout(() => { if (token) connectWs(); }, 5000); };
  ws.onerror = () => { ws.close(); };
}

// ── Utility ──
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ── Boot ──
init();
</script>
</body>
</html>
